<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Multi-User</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0f0f13;
        color: #e0e0e0;
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #1a1a2e;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #2a2a4a;
      }

      header h1 {
        font-size: 1.1rem;
        color: #7c6fff;
        letter-spacing: 1px;
      }

      #status {
        font-size: 0.78rem;
        color: #888;
      }

      #status span {
        color: #4ade80;
        font-weight: bold;
      }

      /* Grid video */
      #video-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 10px;
        padding: 14px;
        align-content: start;
      }

      .video-wrapper {
        position: relative;
        background: #1c1c2e;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 16/9;
        border: 1.5px solid #2d2d50;
        transition: border-color 0.2s;
      }

      .video-wrapper:hover {
        border-color: #7c6fff;
      }

      .video-wrapper video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: #111;
      }

      .video-wrapper .label {
        position: absolute;
        bottom: 8px;
        left: 10px;
        font-size: 0.72rem;
        background: rgba(0, 0, 0, 0.6);
        padding: 2px 8px;
        border-radius: 20px;
        color: #ccc;
      }

      .video-wrapper .cam-off-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: #1c1c2e;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
        color: #555;
        font-size: 0.85rem;
      }

      .video-wrapper .cam-off-overlay svg {
        width: 48px;
        height: 48px;
        opacity: 0.4;
      }

      .cam-off .cam-off-overlay {
        display: flex;
      }

      /* Controls */
      #controls {
        background: #1a1a2e;
        border-top: 1px solid #2a2a4a;
        padding: 14px 20px;
        display: flex;
        justify-content: center;
        gap: 16px;
      }

      .ctrl-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        background: #25253e;
        border: 1.5px solid #3a3a60;
        border-radius: 12px;
        padding: 10px 18px;
        color: #ccc;
        font-size: 0.7rem;
        transition: all 0.2s;
        min-width: 72px;
      }

      .ctrl-btn:hover {
        background: #30305a;
        border-color: #7c6fff;
        color: #fff;
      }

      .ctrl-btn.off {
        background: #3d1a1a;
        border-color: #c0392b;
        color: #e74c3c;
      }

      .ctrl-btn svg {
        width: 22px;
        height: 22px;
      }

      /* Empty state */
      #empty-msg {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #444;
      }

      #empty-msg h2 {
        font-size: 1.4rem;
        margin-bottom: 8px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🎥 WebRTC Phòng Chung</h1>
      <div id="status">Đang kết nối... (<span id="peer-count">0</span> người)</div>
    </header>

    <div id="video-grid">
      <!-- Local video sẽ được thêm vào đây -->
    </div>

    <div id="empty-msg">
      <h2>👋 Chỉ có mình bạn</h2>
      <p>Chờ người khác tham gia...</p>
    </div>

    <div id="controls">
      <!-- Cam -->
      <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 7l-7 5 7 5V7z"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <span>Camera</span>
      </button>

      <!-- Mic -->
      <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span>Micro</span>
      </button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
   const socket = io();
      // --- State ---
      let localStream = null;
      let camOn = true;
      let micOn = true;
      const peerConnections = {}; // peerId -> RTCPeerConnection
      const ICE_SERVERS = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turns:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
        ],
      };

      // =====================
      // 1. Lấy media local
      // =====================
      async function initMedia() {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });
        } catch (e) {
          // Thử chỉ audio nếu không có cam
          try {
            localStream = await navigator.mediaDevices.getUserMedia({
              video: false,
              audio: true,
            });
            camOn = false;
          } catch (e2) {
            localStream = new MediaStream();
            camOn = false;
            micOn = false;
          }
        }
        addLocalVideo();
        updateControlUI();
      }

      function addLocalVideo() {
        const wrapper = document.createElement("div");
        wrapper.className = "video-wrapper";
        wrapper.id = "local-wrapper";

        const video = document.createElement("video");
        video.srcObject = localStream;
        video.autoplay = true;
        video.muted = true; // tắt tiếng local để không echo
        video.playsInline = true;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "Bạn";

        const overlay = document.createElement("div");
        overlay.className = "cam-off-overlay";
        overlay.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
            <line x1="1" y1="1" x2="23" y2="23" stroke-width="2"/>
          </svg>
          <span>Camera tắt</span>`;

        wrapper.appendChild(video);
        wrapper.appendChild(overlay);
        wrapper.appendChild(label);
        document.getElementById("video-grid").appendChild(wrapper);
      }

      // =====================
      // 2. Tạo PeerConnection
      // =====================
      function createPeerConnection(peerId) {
        const pc = new RTCPeerConnection(ICE_SERVERS);

        // Thêm local tracks
        if (localStream) {
          localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));
        }

        // Nhận remote stream
        pc.ontrack = (event) => {
          const remoteStream = event.streams[0];
          if (!document.getElementById("video-" + peerId)) {
            addRemoteVideo(peerId, remoteStream);
          }
        };

        // Gửi ICE candidate
        pc.onicecandidate = (event) => {
          if (event.candidate) {
            socket.emit("ice-candidate", { to: peerId, candidate: event.candidate });
          }
        };

        pc.onconnectionstatechange = () => {
          if (["disconnected", "failed", "closed"].includes(pc.connectionState)) {
            removeVideo(peerId);
          }
        };

        peerConnections[peerId] = pc;
        return pc;
      }

      function addRemoteVideo(peerId, stream) {
        const grid = document.getElementById("video-grid");

        const wrapper = document.createElement("div");
        wrapper.className = "video-wrapper";
        wrapper.id = "video-" + peerId;

        const video = document.createElement("video");
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        video.id = "stream-" + peerId;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "Người dùng " + peerId.slice(0, 5);

        const overlay = document.createElement("div");
        overlay.className = "cam-off-overlay";
        overlay.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
            <line x1="1" y1="1" x2="23" y2="23" stroke-width="2"/>
          </svg>
          <span>Camera tắt</span>`;

        wrapper.appendChild(video);
        wrapper.appendChild(overlay);
        wrapper.appendChild(label);
        grid.appendChild(wrapper);
        updatePeerCount();
      }

      function removeVideo(peerId) {
        const el = document.getElementById("video-" + peerId);
        if (el) el.remove();
        if (peerConnections[peerId]) {
          peerConnections[peerId].close();
          delete peerConnections[peerId];
        }
        updatePeerCount();
      }

      // =====================
      // 3. Signaling events
      // =====================
      socket.on("all-peers", async (peers) => {
        // Người mới: gửi offer cho tất cả peer cũ
        for (const peerId of peers) {
          const pc = createPeerConnection(peerId);
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          socket.emit("offer", { to: peerId, offer });
        }
        updatePeerCount();
      });

      socket.on("peer-joined", (peerId) => {
        // Peer cũ chờ offer từ người mới — không làm gì ở đây
        updatePeerCount();
      });

      socket.on("offer", async ({ from, offer }) => {
        const pc = createPeerConnection(from);
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit("answer", { to: from, answer });
      });

      socket.on("answer", async ({ from, answer }) => {
        const pc = peerConnections[from];
        if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
      });

      socket.on("ice-candidate", async ({ from, candidate }) => {
        const pc = peerConnections[from];
        if (pc && candidate) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(candidate));
          } catch (e) {}
        }
      });

      socket.on("peer-left", (peerId) => {
        removeVideo(peerId);
      });

      // =====================
      // 4. Bật/tắt cam, mic
      // =====================
      function toggleCam() {
        const videoTracks = localStream ? localStream.getVideoTracks() : [];
        if (videoTracks.length === 0) return;

        camOn = !camOn;
        videoTracks.forEach((t) => (t.enabled = camOn));

        const wrapper = document.getElementById("local-wrapper");
        if (wrapper) {
          wrapper.classList.toggle("cam-off", !camOn);
        }
        updateControlUI();
      }

      function toggleMic() {
        const audioTracks = localStream ? localStream.getAudioTracks() : [];
        if (audioTracks.length === 0) return;

        micOn = !micOn;
        audioTracks.forEach((t) => (t.enabled = micOn));
        updateControlUI();
      }

      function updateControlUI() {
        const btnCam = document.getElementById("btn-cam");
        const btnMic = document.getElementById("btn-mic");

        btnCam.classList.toggle("off", !camOn);
        btnCam.querySelector("span").textContent = camOn ? "Camera" : "Cam tắt";

        btnMic.classList.toggle("off", !micOn);
        btnMic.querySelector("span").textContent = micOn ? "Micro" : "Mic tắt";
      }

      function updatePeerCount() {
        const count = Object.keys(peerConnections).length + 1; // +1 = bản thân
        document.getElementById("peer-count").textContent = count;
      }

      // =====================
      // 5. Start
      // =====================
      initMedia();
    </script>
  </body>
</html>
