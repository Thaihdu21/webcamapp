<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>WebRTC Meet</title>

<!-- Font Awesome 5 (iOS 12 compatible) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

<!-- Socket.io -->
<script src="/socket.io/socket.io.js"></script>

<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #202124;
    --surface: #3c4043;
    --surface2: #2d2e31;
    --bar-bg: #1e1f22;
    --accent: #8ab4f8;
    --danger: #f28b82;
    --green: #81c995;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --bar-h: 72px;
    --radius: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== LOBBY ===== */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
    padding: 24px;
  }
  #lobby h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  #lobby p { color: var(--text-dim); font-size: 0.9rem; text-align: center; }
  #name-input {
    width: 100%;
    max-width: 320px;
    padding: 14px 18px;
    border-radius: 8px;
    border: 2px solid var(--surface);
    background: var(--surface2);
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #name-input:focus { border-color: var(--accent); }
  #join-btn {
    width: 100%;
    max-width: 320px;
    padding: 14px;
    background: var(--accent);
    color: #202124;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #join-btn:active { opacity: 0.8; }

  /* ===== ROOM ===== */
  #room { display: none; flex-direction: column; height: 100%; }

  /* ===== VIDEO GRID — Google Meet style ===== */
  #video-grid {
    flex: 1;
    display: grid;
    gap: 4px;
    padding: 4px;
    background: var(--bg);
    overflow: hidden;
    /* dynamic grid columns set by JS */
  }

  /* Each tile */
  .video-tile {
    position: relative;
    background: var(--surface2);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 16/9;
  }

  .video-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: var(--radius);
    background: #000;
    /* Critical for iOS */
    -webkit-playsinline: true;
    playsinline: true;
  }

  /* Name label */
  .tile-label {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 0.78rem;
    padding: 3px 8px;
    border-radius: 6px;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 5px;
    max-width: calc(100% - 16px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Mic muted icon on tile */
  .tile-mic-off {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(242,139,130,0.85);
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
  }
  .tile-mic-off.show { display: flex; }

  /* Cam-off avatar */
  .tile-avatar {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    gap: 10px;
    pointer-events: none;
  }
  .tile-avatar.show { display: flex; }
  .tile-avatar .avatar-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    color: var(--text-dim);
  }
  .tile-avatar .avatar-name {
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  /* ===== BOTTOM BAR ===== */
  #bar {
    height: var(--bar-h);
    background: var(--bar-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 16px;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .ctrl-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: background 0.15s, transform 0.1s;
    color: #fff;
    background: var(--surface);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .ctrl-btn:active { transform: scale(0.92); }

  .ctrl-btn.off { background: var(--danger); color: #fff; }
  .ctrl-btn.end { background: #f44336; width: 60px; }

  /* Participant count badge */
  #peer-count {
    background: var(--surface);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 4px;
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    bottom: calc(var(--bar-h) + 12px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(60,64,67,0.95);
    color: var(--text);
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 0.85rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* ===== RESPONSIVE GRID ===== */
  /* 1 person */
  .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  /* 2 */
  .grid-2 { grid-template-columns: 1fr 1fr; }
  /* 3 */
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .grid-3 .video-tile:last-child { grid-column: 1 / -1; max-width: 50%; margin: 0 auto; width: 100%; }
  /* 4 */
  .grid-4 { grid-template-columns: 1fr 1fr; }
  /* 5-6 */
  .grid-5, .grid-6 { grid-template-columns: 1fr 1fr 1fr; }
  /* 7+ */
  .grid-many { grid-template-columns: repeat(3, 1fr); }

  /* Mobile portrait: max 2 columns */
  @media (max-width: 600px) and (orientation: portrait) {
    .grid-3, .grid-5, .grid-6, .grid-many {
      grid-template-columns: 1fr 1fr;
    }
    .grid-3 .video-tile:last-child { max-width: 100%; }
    .ctrl-btn { width: 46px; height: 46px; font-size: 1rem; }
    .ctrl-btn.end { width: 52px; }
    #bar { gap: 10px; }
  }

  @media (max-width: 380px) {
    #bar { gap: 7px; padding: 0 8px; }
    .ctrl-btn { width: 42px; height: 42px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<!-- ===== LOBBY ===== -->
<div id="lobby">
  <h1>🎥 WebRTC Meet</h1>
  <p>Nhập tên và tham gia phòng — không cần mã phòng</p>
  <input id="name-input" type="text" placeholder="Tên của bạn..." maxlength="30" autocomplete="off" />
  <button id="join-btn"><i class="fas fa-video"></i> &nbsp;Tham gia ngay</button>
</div>

<!-- ===== ROOM ===== -->
<div id="room">
  <div id="video-grid" class="grid-1"></div>

  <div id="bar">
    <button class="ctrl-btn" id="btn-mic" title="Tắt/Bật mic">
      <i class="fas fa-microphone"></i>
    </button>
    <button class="ctrl-btn" id="btn-cam" title="Tắt/Bật camera">
      <i class="fas fa-video"></i>
    </button>
    <button class="ctrl-btn" id="btn-swap" title="Đổi camera">
      <i class="fas fa-sync-alt"></i>
    </button>
    <button class="ctrl-btn end" id="btn-end" title="Rời phòng">
      <i class="fas fa-phone-slash"></i>
    </button>
    <div id="peer-count"><i class="fas fa-users"></i> <span id="count-num">1</span></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    // Public TURN fallback (replace with your own for production)
    {
      urls: 'turn:openrelay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ],
  iceCandidatePoolSize: 10
};

// ============================================================
//  STATE
// ============================================================
let localStream = null;
let myName = '';
let socket = null;
let myId = '';

// peers[id] = { pc: RTCPeerConnection, name, videoEl, audioOn, videoOn }
const peers = {};

let micOn = true;
let camOn = true;
let currentFacing = 'user'; // 'user' | 'environment'
let isSwapping = false;

// ============================================================
//  UTILS
// ============================================================
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), dur);
}

function updateCountBadge() {
  const total = Object.keys(peers).length + 1;
  document.getElementById('count-num').textContent = total;
}

// ============================================================
//  GRID LAYOUT — Google Meet style
// ============================================================
function updateGrid() {
  const grid = document.getElementById('video-grid');
  const n = grid.children.length;
  grid.className = '';
  if      (n <= 1)  grid.classList.add('grid-1');
  else if (n === 2) grid.classList.add('grid-2');
  else if (n === 3) grid.classList.add('grid-3');
  else if (n === 4) grid.classList.add('grid-4');
  else if (n === 5) grid.classList.add('grid-5');
  else if (n === 6) grid.classList.add('grid-6');
  else              grid.classList.add('grid-many');
}

// ============================================================
//  TILE MANAGEMENT
// ============================================================
function createTile(id, name, stream, isLocal) {
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = 'tile-' + id;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;           // iOS requirement
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.muted = isLocal;              // Never echo local audio
  if (stream) {
    video.srcObject = stream;
    video.play().catch(() => {});
  }

  // Cam-off avatar
  const avatar = document.createElement('div');
  avatar.className = 'tile-avatar';
  avatar.innerHTML = `
    <div class="avatar-circle"><i class="fas fa-user"></i></div>
    <span class="avatar-name">${name}</span>
  `;

  // Mic-off badge
  const micBadge = document.createElement('div');
  micBadge.className = 'tile-mic-off';
  micBadge.innerHTML = '<i class="fas fa-microphone-slash"></i>';

  // Name label
  const label = document.createElement('div');
  label.className = 'tile-label';
  label.innerHTML = `<i class="fas fa-user"></i> ${name}${isLocal ? ' (Bạn)' : ''}`;

  tile.append(video, avatar, micBadge, label);

  document.getElementById('video-grid').appendChild(tile);
  updateGrid();
  return tile;
}

function removeTile(id) {
  const t = document.getElementById('tile-' + id);
  if (t) t.remove();
  updateGrid();
}

function setTileMic(id, on) {
  const tile = document.getElementById('tile-' + id);
  if (!tile) return;
  const badge = tile.querySelector('.tile-mic-off');
  if (badge) badge.classList.toggle('show', !on);
}

function setTileCam(id, on) {
  const tile = document.getElementById('tile-' + id);
  if (!tile) return;
  const avatar = tile.querySelector('.tile-avatar');
  const video  = tile.querySelector('video');
  if (on) {
    avatar.classList.remove('show');
    video.style.visibility = 'visible';
  } else {
    avatar.classList.add('show');
    video.style.visibility = 'hidden';
  }
}

// ============================================================
//  GET LOCAL MEDIA (iOS/Android compat)
// ============================================================
async function getLocalStream(facingMode) {
  const constraints = {
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true
    },
    video: {
      facingMode: facingMode,
      width:  { ideal: 640, max: 1280 },
      height: { ideal: 480, max: 720 },
      frameRate: { ideal: 24, max: 30 }
    }
  };

  // iOS 12 fallback: try exact facingMode first, then drop
  try {
    return await navigator.mediaDevices.getUserMedia(constraints);
  } catch (e) {
    console.warn('Exact facingMode failed, retrying without:', e);
    try {
      return await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    } catch (e2) {
      console.warn('Video failed, audio only:', e2);
      return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    }
  }
}

// ============================================================
//  WEBRTC — Create peer connection
// ============================================================
function createPeerConnection(remoteId, remoteName) {
  const pc = new RTCPeerConnection(ICE_CONFIG);

  // Add all local tracks
  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  // ICE candidates
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      socket.emit('ice-candidate', { to: remoteId, candidate });
    }
  };

  // Connection state logging
  pc.onconnectionstatechange = () => {
    console.log(`[${remoteName}] connection: ${pc.connectionState}`);
    if (pc.connectionState === 'failed') {
      // Try ICE restart
      setTimeout(() => {
        if (pc.connectionState === 'failed') {
          pc.restartIce && pc.restartIce();
        }
      }, 2000);
    }
  };

  pc.oniceconnectionstatechange = () => {
    console.log(`[${remoteName}] ICE: ${pc.iceConnectionState}`);
  };

  // Remote stream
  pc.ontrack = ({ streams }) => {
    const stream = streams[0];
    const tile = document.getElementById('tile-' + remoteId);
    if (tile) {
      const video = tile.querySelector('video');
      if (video && (!video.srcObject || video.srcObject.id !== stream.id)) {
        video.srcObject = stream;
        video.play().catch(() => {});
      }
    } else {
      // Tile may not exist yet — create it
      createTile(remoteId, remoteName, stream, false);
    }
    if (peers[remoteId]) peers[remoteId].stream = stream;
  };

  peers[remoteId] = { pc, name: remoteName, audioOn: true, videoOn: true };
  return pc;
}

// ============================================================
//  OFFER / ANSWER
// ============================================================
async function callPeer(remoteId, remoteName) {
  // Avoid duplicate connections
  if (peers[remoteId]) return;

  const pc = createPeerConnection(remoteId, remoteName);
  createTile(remoteId, remoteName, null, false);

  try {
    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: true
    });
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: remoteId, offer });
  } catch (e) {
    console.error('createOffer error:', e);
  }
}

async function handleOffer(fromId, fromName, offer) {
  if (peers[fromId]) {
    // Glare: both sides offered simultaneously → lower id becomes answerer
    if (myId > fromId) {
      // rollback & re-answer
      try { await peers[fromId].pc.setLocalDescription({ type: 'rollback' }); } catch(e) {}
    } else {
      return; // We keep our offer
    }
  }

  const pc = createPeerConnection(fromId, fromName);
  if (!document.getElementById('tile-' + fromId)) {
    createTile(fromId, fromName, null, false);
  }

  try {
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: fromId, answer });
  } catch (e) {
    console.error('handleOffer error:', e);
  }
}

async function handleAnswer(fromId, answer) {
  const peer = peers[fromId];
  if (!peer) return;
  try {
    if (peer.pc.signalingState === 'have-local-offer') {
      await peer.pc.setRemoteDescription(new RTCSessionDescription(answer));
    }
  } catch (e) {
    console.error('handleAnswer error:', e);
  }
}

async function handleIceCandidate(fromId, candidate) {
  const peer = peers[fromId];
  if (!peer) return;
  try {
    await peer.pc.addIceCandidate(new RTCIceCandidate(candidate));
  } catch (e) {
    // Ignore benign ICE errors (end-of-candidates etc.)
    if (!e.message.includes('end-of-candidates')) {
      console.warn('ICE error:', e.message);
    }
  }
}

// ============================================================
//  SWAP CAMERA (Android & iOS optimized)
// ============================================================
async function swapCamera() {
  if (isSwapping) return;
  isSwapping = true;
  document.getElementById('btn-swap').querySelector('i').classList.add('fa-spin');

  const newFacing = currentFacing === 'user' ? 'environment' : 'user';

  try {
    const newStream = await getLocalStream(newFacing);
    const newVideoTrack = newStream.getVideoTracks()[0];

    // Replace track in all peer connections
    for (const id in peers) {
      const pc = peers[id].pc;
      const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) {
        try { await sender.replaceTrack(newVideoTrack); } catch(e) { console.warn(e); }
      }
    }

    // Update local stream
    const oldVideoTrack = localStream.getVideoTracks()[0];
    if (oldVideoTrack) {
      oldVideoTrack.stop();
      localStream.removeTrack(oldVideoTrack);
    }
    localStream.addTrack(newVideoTrack);

    // Update local tile video
    const localTile = document.getElementById('tile-local');
    if (localTile) {
      const video = localTile.querySelector('video');
      if (video) {
        video.srcObject = localStream;
        video.play().catch(() => {});
      }
    }

    // Stop extra audio tracks from new stream
    newStream.getAudioTracks().forEach(t => t.stop());

    currentFacing = newFacing;
    showToast(newFacing === 'user' ? '📷 Camera trước' : '📷 Camera sau');
  } catch (e) {
    console.error('swapCamera error:', e);
    showToast('Không thể đổi camera');
  } finally {
    isSwapping = false;
    document.getElementById('btn-swap').querySelector('i').classList.remove('fa-spin');
  }
}

// ============================================================
//  CONTROLS
// ============================================================
function toggleMic() {
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => { t.enabled = micOn; });
  const btn = document.getElementById('btn-mic');
  btn.classList.toggle('off', !micOn);
  btn.innerHTML = micOn
    ? '<i class="fas fa-microphone"></i>'
    : '<i class="fas fa-microphone-slash"></i>';
  setTileMic('local', micOn);
  socket.emit('media-state', { video: camOn, audio: micOn });
  showToast(micOn ? 'Microphone bật' : 'Microphone tắt');
}

function toggleCam() {
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => { t.enabled = camOn; });
  const btn = document.getElementById('btn-cam');
  btn.classList.toggle('off', !camOn);
  btn.innerHTML = camOn
    ? '<i class="fas fa-video"></i>'
    : '<i class="fas fa-video-slash"></i>';
  setTileCam('local', camOn);
  socket.emit('media-state', { video: camOn, audio: micOn });
  showToast(camOn ? 'Camera bật' : 'Camera tắt');
}

function leaveRoom() {
  for (const id in peers) {
    peers[id].pc.close();
    delete peers[id];
  }
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (socket) socket.disconnect();

  document.getElementById('video-grid').innerHTML = '';
  document.getElementById('room').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  updateGrid();
}

// ============================================================
//  JOIN ROOM
// ============================================================
async function joinRoom() {
  myName = document.getElementById('name-input').value.trim() || 'Guest';
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').style.display = 'flex';

  // 1. Get local media
  try {
    localStream = await getLocalStream(currentFacing);
  } catch (e) {
    showToast('Không thể truy cập camera/mic');
    console.error(e);
  }

  // 2. Create local tile
  createTile('local', myName, localStream, true);

  // 3. Connect socket
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    myId = socket.id;
    socket.emit('join', { name: myName });
  });

  // Existing peers when joining
  socket.on('existing-users', async (users) => {
    for (const user of users) {
      await callPeer(user.id, user.name);
    }
    updateCountBadge();
  });

  // New user joins after us
  socket.on('user-joined', ({ id, name }) => {
    showToast(`${name} đã tham gia`);
    updateCountBadge();
    // The new user will call us — we don't initiate here to avoid glare
  });

  socket.on('offer', async ({ from, offer }) => {
    // Find name from peers or fallback
    const name = peers[from]?.name || 'Guest';
    await handleOffer(from, name, offer);
    updateCountBadge();
  });

  socket.on('answer', async ({ from, answer }) => {
    await handleAnswer(from, answer);
  });

  socket.on('ice-candidate', async ({ from, candidate }) => {
    await handleIceCandidate(from, candidate);
  });

  socket.on('peer-media-state', ({ id, video, audio }) => {
    if (peers[id]) {
      peers[id].audioOn = audio;
      peers[id].videoOn = video;
    }
    setTileMic(id, audio);
    setTileCam(id, video);
  });

  socket.on('user-left', ({ id }) => {
    const name = peers[id]?.name || 'Người dùng';
    showToast(`${name} đã rời phòng`);
    if (peers[id]) {
      peers[id].pc.close();
      delete peers[id];
    }
    removeTile(id);
    updateCountBadge();
  });

  socket.on('disconnect', () => {
    showToast('Mất kết nối server...');
  });

  socket.on('reconnect', () => {
    showToast('Đã kết nối lại');
    socket.emit('join', { name: myName });
  });

  updateCountBadge();
}

// ============================================================
//  EVENT LISTENERS
// ============================================================
document.getElementById('join-btn').addEventListener('click', joinRoom);
document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') joinRoom();
});
document.getElementById('btn-mic').addEventListener('click', toggleMic);
document.getElementById('btn-cam').addEventListener('click', toggleCam);
document.getElementById('btn-swap').addEventListener('click', swapCamera);
document.getElementById('btn-end').addEventListener('click', leaveRoom);

// Prevent zoom on double-tap (mobile)
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
</script>
