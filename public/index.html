<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>VideoCall</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --text: #f0f0ff;
    --text2: #8888aa;
    --radius: 16px;
    --bar-h: 80px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
  }

  #topbar .logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
  }
  #topbar .logo svg { color: var(--accent); }

  #peer-count {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text2);
    background: var(--surface2);
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border);
  }
  #peer-count .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.5; transform:scale(1.3); }
  }

  /* ── VIDEO GRID ── */
  #grid-wrap {
    position: fixed;
    top: 52px; left: 0; right: 0;
    bottom: var(--bar-h);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 8px;
    display: flex;
    align-items: flex-start;
  }

  #video-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-content: start;
  }

  /* Solo: full width */
  #video-grid.count-1 { grid-template-columns: 1fr; }
  /* 2 people: 1 column each */
  #video-grid.count-2 { grid-template-columns: 1fr 1fr; }
  /* 3+: 2 cols */
  #video-grid.count-3,
  #video-grid.count-4 { grid-template-columns: 1fr 1fr; }
  /* 5+: 2 cols still (scrollable) */

  .video-tile {
    position: relative;
    aspect-ratio: 3/4;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1.5px solid var(--border);
    transition: border-color 0.25s;
  }

  /* Local tile: slightly different accent border */
  .video-tile.local { border-color: var(--accent); }

  .video-tile video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    background: #000;
  }
  /* Mirror local cam */
  .video-tile.local video { transform: scaleX(-1); }

  /* Avatar fallback */
  .video-tile .avatar {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--surface2);
    gap: 10px;
  }
  .video-tile .avatar.show { display: flex; }
  .video-tile .avatar .av-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .video-tile .avatar span {
    font-size: 12px; color: var(--text2);
  }

  /* Tile label */
  .video-tile .label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,.7));
    display: flex; align-items: center; justify-content: space-between;
  }
  .video-tile .label .name {
    font-size: 12px; font-weight: 600; color: #fff;
    max-width: 80%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .video-tile .label .mic-status {
    width: 20px; height: 20px;
    background: rgba(255,255,255,.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .video-tile .label .mic-status.muted { background: rgba(239,68,68,.5); }

  /* Speaking indicator */
  .video-tile.speaking { border-color: var(--green) !important; }

  /* ── CONTROL BAR ── */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    gap: 16px;
    padding: 0 20px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .ctrl-btn {
    width: 52px; height: 52px; border-radius: 50%;
    border: none; outline: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .ctrl-btn:active { transform: scale(0.88); }

  .ctrl-btn.on  { background: var(--surface2); border: 1.5px solid var(--border); }
  .ctrl-btn.off { background: rgba(239,68,68,.18); border: 1.5px solid rgba(239,68,68,.4); }

  .ctrl-btn svg { pointer-events: none; }

  /* Hang-up button */
  .ctrl-btn.hangup {
    background: var(--red) !important;
    border: none !important;
    width: 56px; height: 56px;
  }

  /* Swap camera button */
  .ctrl-btn.swap { background: var(--surface2); border: 1.5px solid var(--border); }
  .ctrl-btn.swap:active { background: var(--accent); }

  /* ── TOAST ── */
  #toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 18px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    z-index: 200;
    white-space: nowrap;
    max-width: 90vw;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  #toast.show { opacity: 1; }

  /* ── LOADING OVERLAY ── */
  #loading {
    position: fixed; inset: 0; z-index: 300;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }
  #loading .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--text2); font-size: 14px; }
  #loading.hidden { display: none; }

  /* ── ERROR SCREEN ── */
  #error-screen {
    position: fixed; inset: 0; z-index: 300;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 32px;
    text-align: center;
  }
  #error-screen.show { display: flex; }
  #error-screen .err-icon { font-size: 48px; }
  #error-screen h2 { font-size: 20px; }
  #error-screen p { color: var(--text2); font-size: 14px; line-height: 1.6; }
  #retry-btn {
    margin-top: 8px;
    padding: 12px 32px;
    background: var(--accent);
    color: #fff;
    border: none; border-radius: 24px;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }

  /* ── Empty state ── */
  #empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; pointer-events: none;
  }
  #empty-state .big-icon { font-size: 48px; opacity: .3; }
  #empty-state p { color: var(--text2); font-size: 14px; }

  @media (min-width: 600px) {
    #video-grid { grid-template-columns: repeat(3, 1fr); }
    #video-grid.count-1 { grid-template-columns: minmax(300px, 500px); justify-content: center; }
    #video-grid.count-2 { grid-template-columns: repeat(2, minmax(220px, 380px)); justify-content: center; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>Đang kết nối camera...</p>
</div>

<!-- Error screen -->
<div id="error-screen">
  <div class="err-icon">📷</div>
  <h2>Không thể truy cập camera</h2>
  <p id="error-msg">Vui lòng cấp quyền camera và microphone, sau đó thử lại.</p>
  <button id="retry-btn" onclick="init()">Thử lại</button>
</div>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
    </svg>
    VideoCall
  </div>
  <div id="peer-count">
    <span class="dot"></span>
    <span id="count-label">1 người</span>
  </div>
</div>

<!-- Grid -->
<div id="grid-wrap">
  <div id="video-grid" class="count-1">
    <div id="empty-state">
      <div class="big-icon">👥</div>
      <p>Đang chờ người tham gia...</p>
    </div>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <button id="btn-mic" class="ctrl-btn on" onclick="toggleMic()" title="Microphone">
    <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
      <path d="M19 10v2a7 7 0 01-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>

  <button id="btn-cam" class="ctrl-btn on" onclick="toggleCam()" title="Camera">
    <svg id="cam-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
    </svg>
  </button>

  <button id="btn-swap" class="ctrl-btn swap" onclick="swapCamera()" title="Đổi camera">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 4v6h6"/>
      <path d="M23 20v-6h-6"/>
      <path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/>
    </svg>
  </button>

  <button class="ctrl-btn hangup" onclick="hangup()" title="Rời phòng">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 011.72 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.42 19.42 0 013.43 9.65 19.86 19.86 0 01.36 1a2 2 0 012-2.18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.34 6.72a16 16 0 003.97 6.59"/>
      <line x1="23" y1="1" x2="1" y2="23"/>
    </svg>
  </button>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── Config ──────────────────────────────────────────────
const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun.cloudflare.com:3478' },
    {
      urls: 'turn:openrelay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443?transport=tcp',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
  ]
};

// Constraints: optimized for low-end Android/iOS
function getVideoConstraints(facingMode = 'user') {
  return {
    facingMode,
    width:  { ideal: 480, max: 640 },
    height: { ideal: 640, max: 960 },
    frameRate: { ideal: 24, max: 30 }
  };
}

// ── State ────────────────────────────────────────────────
let localStream = null;
let socket = null;
const peers = new Map();   // peerId -> RTCPeerConnection
const pendingCandidates = new Map(); // peerId -> ICECandidate[]
let micEnabled = true;
let camEnabled = true;
let currentFacingMode = 'user';
let makingOffer = new Set(); // prevent offer collision
let polite = new Map();     // who is polite in perfect negotiation

// ── Init ─────────────────────────────────────────────────
async function init() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('error-screen').classList.remove('show');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: getVideoConstraints('user'),
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        sampleRate: 44100,
      }
    });
  } catch(err) {
    // Try without video
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      camEnabled = false;
      updateCamBtn();
      showToast('Camera không khả dụng, chỉ âm thanh');
    } catch(e) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error-screen').classList.add('show');
      document.getElementById('error-msg').textContent = e.message || 'Không thể truy cập thiết bị.';
      return;
    }
  }

  renderLocalTile();
  connectSocket();
  document.getElementById('loading').classList.add('hidden');
}

// ── Local video tile ─────────────────────────────────────
function renderLocalTile() {
  const grid = document.getElementById('video-grid');
  let tile = document.getElementById('local-tile');
  if (!tile) {
    tile = createTile('local-tile', 'Bạn', true);
    grid.appendChild(tile);
    updateEmptyState();
  }
  const video = tile.querySelector('video');
  video.srcObject = localStream;
  video.muted = true; // always mute self to prevent echo
  const hasVideo = localStream && localStream.getVideoTracks().length > 0 && localStream.getVideoTracks()[0].enabled;
  toggleAvatar(tile, !hasVideo);
}

function createTile(id, name, isLocal) {
  const tile = document.createElement('div');
  tile.className = 'video-tile' + (isLocal ? ' local' : '');
  tile.id = id;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  video.muted = isLocal;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');

  // Try to play on metadata loaded
  video.addEventListener('loadedmetadata', () => {
    video.play().catch(() => {});
  });

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = `<div class="av-icon">👤</div><span>${isLocal ? 'Cam tắt' : 'Cam tắt'}</span>`;

  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = `
    <span class="name">${name}</span>
    <span class="mic-status" id="mic-${id}">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
      </svg>
    </span>`;

  tile.append(video, avatar, label);
  return tile;
}

function toggleAvatar(tile, show) {
  const av = tile.querySelector('.avatar');
  if (av) av.classList.toggle('show', show);
}

function updateEmptyState() {
  const grid = document.getElementById('video-grid');
  const empty = document.getElementById('empty-state');
  const tiles = grid.querySelectorAll('.video-tile');
  if (empty) empty.style.display = tiles.length > 1 ? 'none' : 'flex';
  updateGridClass(tiles.length);
}

function updateGridClass(count) {
  const grid = document.getElementById('video-grid');
  grid.className = 'count-' + Math.min(count, 6);
  document.getElementById('count-label').textContent = count + ' người';
}

// ── Socket.IO ────────────────────────────────────────────
function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'], reconnection: true, reconnectionAttempts: 10 });

  socket.on('connect', () => {
    console.log('Socket connected:', socket.id);
    showToast('Đã kết nối máy chủ');
  });

  socket.on('disconnect', () => showToast('Mất kết nối, đang thử lại...'));

  // Existing users when we join
  socket.on('existing-users', (userIds) => {
    console.log('Existing users:', userIds);
    userIds.forEach((id, index) => {
      // We are impolite (initiator) toward existing peers
      polite.set(id, false);
      // Stagger offers to reduce simultaneous load on low-end devices
      setTimeout(() => createPeer(id, true), index * 300);
    });
  });

  // A new user joined after us
  socket.on('user-joined', (id) => {
    console.log('User joined:', id);
    // We are polite (non-initiator) toward newcomers
    polite.set(id, true);
    createPeer(id, false);
    showToast('Có người vào phòng');
  });

  socket.on('user-left', (id) => {
    console.log('User left:', id);
    removePeer(id);
    showToast('Có người rời phòng');
  });

  // Signaling
  socket.on('offer', async ({ from, offer }) => {
    await handleOffer(from, offer);
  });

  socket.on('answer', async ({ from, answer }) => {
    await handleAnswer(from, answer);
  });

  socket.on('ice-candidate', async ({ from, candidate }) => {
    await handleIceCandidate(from, candidate);
  });

  // Media state from remote
  socket.on('peer-media-state', ({ from, video, audio }) => {
    updateRemoteMediaState(from, video, audio);
  });
}

// ── Peer Connection ──────────────────────────────────────
function createPeer(peerId, shouldOffer) {
  if (peers.has(peerId)) {
    console.warn('Peer already exists:', peerId);
    return peers.get(peerId);
  }

  console.log('Creating peer:', peerId, shouldOffer ? '(initiator)' : '(receiver)');

  const pc = new RTCPeerConnection(ICE_SERVERS);
  peers.set(peerId, pc);
  pendingCandidates.set(peerId, []);

  // Add local tracks
  if (localStream) {
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }

  // ICE candidates
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      socket.emit('ice-candidate', { to: peerId, candidate });
    }
  };

  pc.oniceconnectionstatechange = () => {
    const state = pc.iceConnectionState;
    console.log(`ICE [${peerId.slice(0,6)}]: ${state}`);
    if (state === 'failed') {
      pc.restartIce();
    }
    if (state === 'disconnected') {
      // Wait before cleanup
      setTimeout(() => {
        if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
          removePeer(peerId);
        }
      }, 5000);
    }
  };

  pc.onconnectionstatechange = () => {
    console.log(`Connection [${peerId.slice(0,6)}]: ${pc.connectionState}`);
    if (pc.connectionState === 'failed') {
      // Attempt ICE restart
      if (shouldOffer) {
        makeOffer(peerId, true);
      }
    }
  };

  // Receive remote tracks
  pc.ontrack = ({ streams, track }) => {
    const stream = streams[0];
    if (!stream) return;
    const tileId = 'peer-' + peerId;
    let tile = document.getElementById(tileId);
    if (!tile) {
      const shortId = peerId.slice(0, 6);
      tile = createTile(tileId, 'Người dùng ' + shortId, false);
      document.getElementById('video-grid').appendChild(tile);
      updateEmptyState();
    }
    const video = tile.querySelector('video');
    if (!video.srcObject || video.srcObject.id !== stream.id) {
      video.srcObject = stream;
    }
    track.onunmute = () => {
      if (track.kind === 'video') toggleAvatar(tile, false);
      video.play().catch(() => {});
    };
    track.onmute = () => {
      if (track.kind === 'video') toggleAvatar(tile, true);
    };
  };

  // Negotiation needed (Perfect Negotiation)
  pc.onnegotiationneeded = async () => {
    if (shouldOffer) {
      await makeOffer(peerId, false);
    }
  };

  return pc;
}

async function makeOffer(peerId, isRestart) {
  const pc = peers.get(peerId);
  if (!pc) return;
  if (makingOffer.has(peerId)) return;
  makingOffer.add(peerId);
  try {
    const offerOptions = isRestart ? { iceRestart: true } : {};
    const offer = await pc.createOffer(offerOptions);
    if (pc.signalingState !== 'stable') return;
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: peerId, offer: pc.localDescription });
  } catch(e) {
    console.error('makeOffer error:', e);
  } finally {
    makingOffer.delete(peerId);
  }
}

async function handleOffer(from, offer) {
  if (!peers.has(from)) {
    createPeer(from, false);
  }
  const pc = peers.get(from);
  if (!pc) return;

  const isPolite = polite.get(from) ?? true;
  const offerCollision = pc.signalingState !== 'stable' || makingOffer.has(from);

  if (!isPolite && offerCollision) {
    console.log('Ignoring colliding offer (impolite)');
    return;
  }

  try {
    if (offerCollision) {
      await Promise.all([
        pc.setLocalDescription({ type: 'rollback' }),
        pc.setRemoteDescription(offer)
      ]);
    } else {
      await pc.setRemoteDescription(offer);
    }
    // Flush pending candidates
    await flushCandidates(from);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer: pc.localDescription });
  } catch(e) {
    console.error('handleOffer error:', e);
  }
}

async function handleAnswer(from, answer) {
  const pc = peers.get(from);
  if (!pc) return;
  if (pc.signalingState !== 'have-local-offer') return;
  try {
    await pc.setRemoteDescription(answer);
    await flushCandidates(from);
  } catch(e) {
    console.error('handleAnswer error:', e);
  }
}

async function handleIceCandidate(from, candidate) {
  const pc = peers.get(from);
  if (!pc) return;
  // Buffer candidates if remote description not set yet
  if (!pc.remoteDescription || !pc.remoteDescription.type) {
    if (!pendingCandidates.has(from)) pendingCandidates.set(from, []);
    pendingCandidates.get(from).push(candidate);
    return;
  }
  try {
    await pc.addIceCandidate(new RTCIceCandidate(candidate));
  } catch(e) {
    if (!e.message.includes('closed')) console.error('ICE candidate error:', e);
  }
}

async function flushCandidates(peerId) {
  const candidates = pendingCandidates.get(peerId) || [];
  const pc = peers.get(peerId);
  if (!pc || !pc.remoteDescription) return;
  for (const c of candidates) {
    try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
  }
  pendingCandidates.set(peerId, []);
}

function removePeer(peerId) {
  const pc = peers.get(peerId);
  if (pc) {
    pc.ontrack = null;
    pc.onicecandidate = null;
    pc.oniceconnectionstatechange = null;
    pc.onconnectionstatechange = null;
    pc.onnegotiationneeded = null;
    pc.close();
    peers.delete(peerId);
  }
  pendingCandidates.delete(peerId);
  makingOffer.delete(peerId);
  polite.delete(peerId);

  const tile = document.getElementById('peer-' + peerId);
  if (tile) tile.remove();
  updateEmptyState();
}

// ── Media controls ───────────────────────────────────────
function toggleMic() {
  if (!localStream) return;
  const tracks = localStream.getAudioTracks();
  micEnabled = !micEnabled;
  tracks.forEach(t => t.enabled = micEnabled);
  socket.emit('media-state', { video: camEnabled, audio: micEnabled });
  updateMicBtn();
  showToast(micEnabled ? 'Microphone bật' : 'Microphone tắt');
}

function toggleCam() {
  if (!localStream) return;
  const tracks = localStream.getVideoTracks();
  if (tracks.length === 0) { showToast('Không có camera'); return; }
  camEnabled = !camEnabled;
  tracks.forEach(t => t.enabled = camEnabled);
  socket.emit('media-state', { video: camEnabled, audio: micEnabled });
  updateCamBtn();
  const tile = document.getElementById('local-tile');
  if (tile) toggleAvatar(tile, !camEnabled);
  showToast(camEnabled ? 'Camera bật' : 'Camera tắt');
}

async function swapCamera() {
  if (!localStream) return;
  const videoTracks = localStream.getVideoTracks();
  if (videoTracks.length === 0) { showToast('Không có camera'); return; }

  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  showToast(currentFacingMode === 'user' ? 'Camera trước' : 'Camera sau');

  try {
    // Get new stream with opposite camera
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: getVideoConstraints(currentFacingMode),
      audio: false
    });
    const newVideoTrack = newStream.getVideoTracks()[0];

    // Replace track in all peer connections
    for (const [peerId, pc] of peers) {
      const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) {
        await sender.replaceTrack(newVideoTrack).catch(console.error);
      }
    }

    // Stop old video track
    videoTracks.forEach(t => { t.stop(); localStream.removeTrack(t); });
    localStream.addTrack(newVideoTrack);
    newVideoTrack.enabled = camEnabled;

    // Update local preview
    const localVideo = document.querySelector('#local-tile video');
    if (localVideo) {
      localVideo.srcObject = null;
      localVideo.srcObject = localStream;
    }
    // Mirror: front cam mirrors, back cam doesn't
    if (localVideo) {
      localVideo.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    }
  } catch(e) {
    console.error('Swap camera error:', e);
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    showToast('Không thể đổi camera');
  }
}

function hangup() {
  peers.forEach((pc, id) => removePeer(id));
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (socket) socket.disconnect();
  showToast('Đã rời phòng');
  setTimeout(() => location.reload(), 1500);
}

// ── UI updates ───────────────────────────────────────────
function updateMicBtn() {
  const btn = document.getElementById('btn-mic');
  btn.className = 'ctrl-btn ' + (micEnabled ? 'on' : 'off');
  btn.querySelector('svg').innerHTML = micEnabled
    ? `<path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`
    : `<line x1="1" y1="1" x2="23" y2="23" stroke="#ef4444"/><path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6" stroke="#ef4444"/><path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23" stroke="#ef4444"/><line x1="12" y1="19" x2="12" y2="23" stroke="#ef4444"/><line x1="8" y1="23" x2="16" y2="23" stroke="#ef4444"/>`;
}

function updateCamBtn() {
  const btn = document.getElementById('btn-cam');
  btn.className = 'ctrl-btn ' + (camEnabled ? 'on' : 'off');
  btn.querySelector('svg').innerHTML = camEnabled
    ? `<path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>`
    : `<path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14" stroke="#ef4444"/><rect x="1" y="5" width="14" height="14" rx="2" ry="2" stroke="#ef4444"/><line x1="1" y1="1" x2="23" y2="23" stroke="#ef4444"/>`;
}

function updateRemoteMediaState(peerId, video, audio) {
  const tileId = 'peer-' + peerId;
  const tile = document.getElementById(tileId);
  if (!tile) return;
  toggleAvatar(tile, !video);
  const micEl = document.getElementById('mic-' + tileId);
  if (micEl) micEl.classList.toggle('muted', !audio);
}

// ── Toast ────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Start ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);

// Handle page visibility (mobile background)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && localStream) {
    localStream.getVideoTracks().forEach(t => {
      if (t.readyState === 'ended' && camEnabled) {
        // Reinitialise if track ended in background
        init();
      }
    });
  }
});
</script>
