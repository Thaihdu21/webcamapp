<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Video Call Đa Người - WebRTC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #10141c 0%, #1a1f2a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 16px;
            padding-bottom: 90px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px 0;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #E0E7FF, #A5F3FC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .badge {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 8px;
            font-weight: 500;
            color: #CBD5E1;
        }

        /* Grid video container */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Video card */
        .video-card {
            background: #0a0e14;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4 / 3;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: scale(1.01);
            box-shadow: 0 20px 32px rgba(0,0,0,0.6);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            display: block;
        }
        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #f1f5f9;
            pointer-events: none;
            z-index: 2;
        }
        .video-status {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            z-index: 2;
        }
        .mic-off-icon, .cam-off-icon {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .off-badge {
            background: #dc2626;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.65rem;
        }

        /* Control bar */
        .control-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(24, 28, 38, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 28px rgba(0,0,0,0.4);
            z-index: 100;
        }
        .ctrl-btn {
            background: #2d3748;
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            color: white;
            font-size: 1.6rem;
        }
        .ctrl-btn:active {
            transform: scale(0.94);
            background: #1f2a3e;
        }
        .ctrl-btn.active {
            background: #3b82f6;
            color: white;
        }
        .ctrl-btn.danger {
            background: #dc2626;
        }
        .ctrl-btn.danger.active {
            background: #ef4444;
        }
        .ctrl-btn.swap {
            background: #0f172a;
            border: 1px solid #38bdf8;
        }
        @media (max-width: 560px) {
            .ctrl-btn { width: 48px; height: 48px; font-size: 1.4rem; }
            .control-bar { gap: 12px; padding: 8px 16px; bottom: 16px; }
            .video-grid { gap: 12px; grid-template-columns: 1fr; }
        }

        /* thông báo */
        .info-toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 4px solid #3b82f6;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 99;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            backdrop-filter: blur(12px);
            font-weight: 500;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e14ee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(4px);
            flex-direction: column;
            gap: 20px;
            transition: all 0.2s;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #ffffff30;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden {
            display: none;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="header">
    <h1>📡 MeetNow · Không mã phòng</h1>
    <div class="badge" id="roomBadge">Đang kết nối ...</div>
</div>

<div class="video-grid" id="videoGrid">
    <!-- Local video sẽ thêm động -->
</div>

<div class="control-bar">
    <button class="ctrl-btn" id="toggleVideoBtn" title="Bật/Tắt Camera">🎥</button>
    <button class="ctrl-btn" id="toggleAudioBtn" title="Bật/Tắt Micro">🎤</button>
    <button class="ctrl-btn swap" id="swapCameraBtn" title="Đổi camera trước/sau">🔄</button>
</div>

<div id="toastMsg" class="info-toast"></div>
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div>Đang truy cập camera & micro...</div>
</div>

<script>
    // =============== CẤU HÌNH ===============
    const ICE_SERVERS = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    // Ràng buộc cho mobile đời thấp (độ phân giải thấp, fps vừa phải)
    const VIDEO_CONSTRAINTS = {
        width: { ideal: 480, max: 640 },
        height: { ideal: 640, max: 720 },
        frameRate: { ideal: 15, max: 20 }
    };

    let socket = null;
    let localStream = null;          // local media stream
    let currentVideoDeviceId = null; // để swap
    let allVideoDevices = [];

    // Map lưu peer connection và element remote
    let peerConnections = new Map();   // key: socketId, value: RTCPeerConnection
    let remoteVideoElements = new Map(); // key: socketId, value: <video> element

    let userId = null;
    let isVideoEnabled = true;
    let isAudioEnabled = true;
    let localVideoElement = null;

    // DOM elements
    const videoGrid = document.getElementById('videoGrid');
    const toggleVideoBtn = document.getElementById('toggleVideoBtn');
    const toggleAudioBtn = document.getElementById('toggleAudioBtn');
    const swapCameraBtn = document.getElementById('swapCameraBtn');
    const toastMsg = document.getElementById('toastMsg');
    const loadingOverlay = document.getElementById('loadingOverlay');

    function showToast(text, isError = false) {
        toastMsg.style.opacity = '1';
        toastMsg.style.background = isError ? '#450a0a' : '#1e293b';
        toastMsg.style.borderLeftColor = isError ? '#ef4444' : '#3b82f6';
        toastMsg.innerText = text;
        setTimeout(() => {
            toastMsg.style.opacity = '0';
        }, 2800);
    }

    // =============== HÀM LẤY MEDIA (tối ưu mobile) ===============
    async function getMediaWithDeviceId(videoDeviceId = null, audioEnable = true) {
        const videoConstraints = videoDeviceId ? 
            { deviceId: { exact: videoDeviceId }, ...VIDEO_CONSTRAINTS } : 
            { ...VIDEO_CONSTRAINTS, facingMode: 'user' }; // fallback

        const constraints = {
            video: videoConstraints,
            audio: audioEnable ? { echoCancellation: true, noiseSuppression: true, autoGainControl: true } : false
        };
        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            return stream;
        } catch (err) {
            console.error("getUserMedia error:", err);
            throw err;
        }
    }

    // Liệt kê camera để swap
    async function enumerateCameras() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return [];
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoInputs = devices.filter(device => device.kind === 'videoinput');
        allVideoDevices = videoInputs;
        return videoInputs;
    }

    // Thay đổi camera (swap) dùng replaceTrack (không renegotiate)
    async function swapCamera() {
        if (!localStream) {
            showToast("Chưa có luồng video", true);
            return;
        }
        await enumerateCameras();
        if (allVideoDevices.length < 2) {
            showToast("⚠️ Không tìm thấy camera thứ hai để đổi", true);
            return;
        }
        // Lấy device hiện tại của video track
        const oldVideoTrack = localStream.getVideoTracks()[0];
        if (!oldVideoTrack) return;
        const oldDeviceId = oldVideoTrack.getSettings().deviceId;
        // Tìm camera khác với device id hiện tại
        let nextDevice = allVideoDevices.find(device => device.deviceId !== oldDeviceId);
        if (!nextDevice) nextDevice = allVideoDevices[0]; // fallback
        const newDeviceId = nextDevice.deviceId;

        showToast("🔄 Đang chuyển camera...");
        let newVideoStream = null;
        try {
            // Chỉ lấy video track mới, giữ nguyên audio track cũ
            newVideoStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: { exact: newDeviceId }, ...VIDEO_CONSTRAINTS },
                audio: false
            });
            const newVideoTrack = newVideoStream.getVideoTracks()[0];
            if (!newVideoTrack) throw new Error("Không lấy được video track mới");

            // Thay thế track cho local stream
            const oldVideoIdx = localStream.getVideoTracks().indexOf(oldVideoTrack);
            if (oldVideoIdx !== -1) {
                localStream.removeTrack(oldVideoTrack);
                oldVideoTrack.stop();
                localStream.addTrack(newVideoTrack);
            } else {
                // fallback: tạo lại stream
                throw new Error("track not found");
            }

            // Cập nhật local video element
            if (localVideoElement && localVideoElement.srcObject !== localStream) {
                localVideoElement.srcObject = localStream;
            }

            // Thay thế track cho tất cả các peer connection (video sender)
            for (let [peerId, pc] of peerConnections.entries()) {
                const senders = pc.getSenders();
                const videoSender = senders.find(sender => sender.track && sender.track.kind === 'video');
                if (videoSender) {
                    try {
                        await videoSender.replaceTrack(newVideoTrack);
                    } catch (err) {
                        console.warn(`replaceTrack error for ${peerId}:`, err);
                    }
                }
            }
            currentVideoDeviceId = newDeviceId;
            showToast("✅ Đã đổi camera");
        } catch (err) {
            console.error("Swap camera error:", err);
            showToast("Lỗi đổi camera, thử lại", true);
            // rollback không cần
        } finally {
            if (newVideoStream) {
                newVideoStream.getVideoTracks().forEach(t => { if (t !== localStream.getVideoTracks()[0]) t.stop(); });
            }
        }
    }

    // Bật tắt local video (enabled track)
    function toggleLocalVideo() {
        if (!localStream) return;
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack) {
            isVideoEnabled = !isVideoEnabled;
            videoTrack.enabled = isVideoEnabled;
            toggleVideoBtn.classList.toggle('active', isVideoEnabled);
            toggleVideoBtn.classList.toggle('danger', !isVideoEnabled);
            // Gửi trạng thái để UI remote hiển thị (optional)
            socket.emit('user-media-status', { videoEnabled: isVideoEnabled, audioEnabled: isAudioEnabled });
            showToast(isVideoEnabled ? "Bật camera" : "Tắt camera");
            updateLocalStatusIcon();
        }
    }

    function toggleLocalAudio() {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            isAudioEnabled = !isAudioEnabled;
            audioTrack.enabled = isAudioEnabled;
            toggleAudioBtn.classList.toggle('active', isAudioEnabled);
            toggleAudioBtn.classList.toggle('danger', !isAudioEnabled);
            socket.emit('user-media-status', { videoEnabled: isVideoEnabled, audioEnabled: isAudioEnabled });
            showToast(isAudioEnabled ? "Bật micro" : "Tắt micro");
            updateLocalStatusIcon();
        }
    }

    function updateLocalStatusIcon() {
        if (!localVideoElement) return;
        const parentCard = localVideoElement.closest('.video-card');
        if (!parentCard) return;
        let statusDiv = parentCard.querySelector('.video-status');
        if (!statusDiv) {
            statusDiv = document.createElement('div');
            statusDiv.className = 'video-status';
            parentCard.appendChild(statusDiv);
        }
        statusDiv.innerHTML = `
            <span class="mic-off-icon">${!isAudioEnabled ? '🔇' : '🎤'}</span>
            <span class="cam-off-icon">${!isVideoEnabled ? '📷❌' : ''}</span>
        `;
        if(!isVideoEnabled) statusDiv.innerHTML += `<span class="off-badge">Cam tắt</span>`;
    }

    // Tạo video card
    function createVideoCard(peerId, isLocal = false, name = "") {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.id = isLocal ? 'localVideoCard' : `remoteCard_${peerId}`;
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = isLocal; // local luôn muted để tránh hú
        video.volume = 1;
        const label = document.createElement('div');
        label.className = 'video-label';
        label.innerText = isLocal ? `👤 Bạn ${name ? `(${name})` : ''}` : `👥 Thành viên`;
        const statusDiv = document.createElement('div');
        statusDiv.className = 'video-status';
        card.appendChild(video);
        card.appendChild(label);
        card.appendChild(statusDiv);
        if (isLocal) {
            localVideoElement = video;
        } else {
            remoteVideoElements.set(peerId, video);
        }
        return { card, video };
    }

    // Hiển thị local video
    async function initLocalMedia() {
        try {
            const stream = await getMediaWithDeviceId(null, true);
            localStream = stream;
            isVideoEnabled = true;
            isAudioEnabled = true;
            // Xóa local card nếu có
            const existingLocalCard = document.getElementById('localVideoCard');
            if(existingLocalCard) existingLocalCard.remove();
            const { card, video } = createVideoCard(null, true, "Bạn");
            video.srcObject = localStream;
            videoGrid.prepend(card);
            updateLocalStatusIcon();
            // Lấy danh sách camera
            await enumerateCameras();
            if (allVideoDevices.length > 0) currentVideoDeviceId = localStream.getVideoTracks()[0]?.getSettings().deviceId;
            // set button state
            toggleVideoBtn.classList.add('active');
            toggleAudioBtn.classList.add('active');
            toggleVideoBtn.classList.remove('danger');
            toggleAudioBtn.classList.remove('danger');
            showToast("✅ Camera và mic đã sẵn sàng");
        } catch (err) {
            console.error("Init media error:", err);
            showToast("Không thể truy cập camera/micro, vui lòng cấp quyền", true);
            // fallback: cho phép dùng nhưng không có stream
            localStream = null;
            const { card, video } = createVideoCard(null, true, "Bạn (ko cam)");
            video.poster = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='gray'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z'/%3E%3C/svg%3E";
            video.style.objectFit = "contain";
            videoGrid.prepend(card);
            localVideoElement = video;
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    }

    // =============== WEBRTC SIGNALING (Mesh) ===============
    async function createPeerConnection(targetId, isInitiator = false) {
        if (peerConnections.has(targetId)) {
            return peerConnections.get(targetId);
        }
        const pc = new RTCPeerConnection(ICE_SERVERS);
        peerConnections.set(targetId, pc);

        // Thêm local tracks nếu có
        if (localStream) {
            localStream.getTracks().forEach(track => {
                if (localStream.getTracks().includes(track)) {
                    pc.addTrack(track, localStream);
                }
            });
        }

        // Xử lý ICE candidate
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('ice-candidate', { target: targetId, candidate: event.candidate });
            }
        };

        pc.ontrack = (event) => {
            const remoteVideo = remoteVideoElements.get(targetId);
            if (remoteVideo && !remoteVideo.srcObject) {
                remoteVideo.srcObject = event.streams[0];
            } else if (!remoteVideo) {
                // Tạo card mới nếu chưa có
                const { card, video } = createVideoCard(targetId, false);
                video.srcObject = event.streams[0];
                videoGrid.appendChild(card);
                remoteVideoElements.set(targetId, video);
                // Cập nhật nhãn
                const label = card.querySelector('.video-label');
                if (label) label.innerText = `🎥 Thành viên ${targetId.slice(0,5)}`;
            } else {
                remoteVideo.srcObject = event.streams[0];
            }
        };

        pc.onconnectionstatechange = () => {
            console.log(`Connection state with ${targetId}: ${pc.connectionState}`);
            if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                closePeerConnection(targetId);
                showToast(`Mất kết nối với một người`, true);
            }
        };

        if (isInitiator && localStream) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', { target: targetId, offer: pc.localDescription });
        }
        return pc;
    }

    async function closePeerConnection(peerId) {
        const pc = peerConnections.get(peerId);
        if (pc) {
            pc.close();
            peerConnections.delete(peerId);
        }
        const videoEl = remoteVideoElements.get(peerId);
        if (videoEl && videoEl.parentElement) {
            videoEl.parentElement.remove();
        }
        remoteVideoElements.delete(peerId);
    }

    function closeAllConnections() {
        for (let [peerId, pc] of peerConnections.entries()) {
            pc.close();
        }
        peerConnections.clear();
        remoteVideoElements.forEach((video, id) => {
            if (video && video.parentElement) video.parentElement.remove();
        });
        remoteVideoElements.clear();
    }

    // Socket handlers
    function setupSocketHandlers() {
        socket.on('connect', () => {
            userId = socket.id;
            document.getElementById('roomBadge').innerText = `👥 Phòng chung · ID: ${userId.slice(0,6)}`;
            socket.emit('join-room');
        });

        socket.on('existing-users', (users) => {
            // users là danh sách các socket id (không bao gồm chính mình)
            console.log("Existing users:", users);
            for (let existingId of users) {
                if (existingId !== socket.id) {
                    createPeerConnection(existingId, true).catch(e => console.warn(e));
                }
            }
        });

        socket.on('user-joined', (newUserId) => {
            if (newUserId === socket.id) return;
            if (!peerConnections.has(newUserId)) {
                createPeerConnection(newUserId, false).catch(e => console.warn(e));
            }
        });

        socket.on('offer', async ({ from, offer }) => {
            let pc = peerConnections.get(from);
            if (!pc) {
                pc = await createPeerConnection(from, false);
            }
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', { target: from, answer: pc.localDescription });
        });

        socket.on('answer', async ({ from, answer }) => {
            const pc = peerConnections.get(from);
            if (pc && pc.signalingState !== 'closed') {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
            }
        });

        socket.on('ice-candidate', async ({ from, candidate }) => {
            const pc = peerConnections.get(from);
            if (pc && candidate) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (err) {
                    console.warn("ICE candidate error:", err);
                }
            }
        });

        socket.on('user-left', (leftUserId) => {
            closePeerConnection(leftUserId);
            showToast(`Một người đã rời khỏi phòng`, false);
        });

        // Nhận trạng thái media (chỉ để cập nhật badge)
        socket.on('peer-media-status', ({ userId: peerId, videoEnabled, audioEnabled }) => {
            const videoCard = document.getElementById(`remoteCard_${peerId}`);
            if (videoCard) {
                let statusDiv = videoCard.querySelector('.video-status');
                if (!statusDiv) {
                    statusDiv = document.createElement('div');
                    statusDiv.className = 'video-status';
                    videoCard.appendChild(statusDiv);
                }
                statusDiv.innerHTML = `
                    <span>${!audioEnabled ? '🔇' : '🎤'}</span>
                    <span>${!videoEnabled ? '📵' : ''}</span>
                `;
            }
        });
    }

    // Xử lý reconnect khi mất mạng
    function initSocket() {
        socket = io({
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });
        setupSocketHandlers();
        socket.on('disconnect', () => {
            showToast("Mất kết nối server, đang thử lại...", true);
            closeAllConnections();
        });
        socket.on('connect_error', () => {
            showToast("Lỗi kết nối đến server, kiểm tra mạng", true);
        });
    }

    // ============== MAIN ==============
    window.addEventListener('load', async () => {
        initSocket();
        await initLocalMedia();

        // Sự kiện nút
        toggleVideoBtn.addEventListener('click', toggleLocalVideo);
        toggleAudioBtn.addEventListener('click', toggleLocalAudio);
        swapCameraBtn.addEventListener('click', swapCamera);

        // Gửi định kỳ status khi thay đổi
        setInterval(() => {
            if (socket && socket.connected && localStream) {
                socket.emit('user-media-status', { videoEnabled: isVideoEnabled, audioEnabled: isAudioEnabled });
            }
        }, 4000);
    });

    window.addEventListener('beforeunload', () => {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        if (socket) socket.disconnect();
    });
</script>
</body>
</html>
