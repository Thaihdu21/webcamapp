<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>WebRTC Meet</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
<!-- Socket.io loaded after DOM -->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#202124;--surface:#3c4043;--surface2:#2d2e31;
  --bar:#1e1f22;--accent:#8ab4f8;--danger:#f28b82;
  --text:#e8eaed;--dim:#9aa0a6;--bar-h:72px;--gap:4px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',Roboto,Arial,sans-serif;
  overflow:hidden;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;}

/* ── LOBBY ── */
#lobby{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:18px;padding:28px;}
#lobby h1{font-size:1.5rem;font-weight:700;}
#lobby p{color:var(--dim);font-size:.88rem;text-align:center;}
#name-input{width:100%;max-width:300px;padding:13px 16px;
  border-radius:8px;border:2px solid var(--surface);
  background:var(--surface2);color:var(--text);font-size:1rem;
  outline:none;-webkit-appearance:none;}
#name-input:focus{border-color:var(--accent);}
#join-btn{width:100%;max-width:300px;padding:13px;
  background:var(--accent);color:#202124;font-size:1rem;
  font-weight:700;border:none;border-radius:8px;cursor:pointer;}

/* ── ROOM ── */
#room{display:none;flex-direction:column;height:100%;}

/* ── VIDEO GRID ── */
#video-grid{
  flex:1;display:grid;gap:var(--gap);padding:var(--gap);
  background:var(--bg);overflow:hidden;align-content:center;
}

/* Grid layouts – Google Meet style */
/* 1 người: 1 ô to giữa */
.g1{grid-template-columns:1fr;grid-template-rows:1fr;}
/* 2 người: 2 cột bằng nhau */
.g2{grid-template-columns:1fr 1fr;}
/* 3 người: hàng trên 2 ô, hàng dưới 1 ô giữa */
.g3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.g3 .tile:nth-child(3){
  grid-column:1/3;
  max-width:50%;justify-self:center;width:100%;
}
/* 4 người: 2x2 */
.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
/* 5-6 người: 3 cột */
.g5,.g6{grid-template-columns:1fr 1fr 1fr;}
/* 7+: 3 cột */
.gmany{grid-template-columns:1fr 1fr 1fr;}

/* ── TILE ── */
.tile{
  position:relative;background:#1a1b1e;border-radius:10px;
  overflow:hidden;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
}
.tile video{
  width:100%;height:100%;object-fit:cover;
  display:block;background:#000;border-radius:10px;
  /* iOS critical */
  -webkit-playsinline:true;
}
/* tên + mic status */
.tile-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 8px 6px;
  background:linear-gradient(transparent,rgba(0,0,0,.55));
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
}
.tile-name{
  color:#fff;font-size:.75rem;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:5px;max-width:80%;
}
.tile-mic-icon{
  width:24px;height:24px;border-radius:50%;
  background:rgba(242,139,130,.9);color:#fff;
  display:none;align-items:center;justify-content:center;
  font-size:.6rem;flex-shrink:0;
}
.tile-mic-icon.show{display:flex;}

/* cam-off avatar */
.tile-avatar{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:#1a1b1e;gap:8px;pointer-events:none;
}
.tile-avatar.show{display:flex;}
.av-circle{
  width:56px;height:56px;border-radius:50%;
  background:var(--surface);display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;color:var(--dim);
}
.av-name{color:var(--dim);font-size:.8rem;}

/* ── BAR ── */
#bar{
  height:var(--bar-h);background:var(--bar);
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:0 12px;flex-shrink:0;
  border-top:1px solid rgba(255,255,255,.07);
}
.btn{
  width:50px;height:50px;border-radius:50%;border:none;
  background:var(--surface);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;transition:background .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.btn:active{transform:scale(.9);}
.btn.off{background:var(--danger);}
.btn.end{background:#d93025;width:58px;}
#badge{
  background:var(--surface);color:var(--dim);
  padding:5px 12px;border-radius:20px;font-size:.78rem;
  display:flex;align-items:center;gap:5px;flex-shrink:0;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(var(--bar-h) + 10px);left:50%;
  transform:translateX(-50%);
  background:rgba(60,64,67,.95);color:var(--text);
  padding:8px 16px;border-radius:8px;font-size:.82rem;
  pointer-events:none;opacity:0;transition:opacity .3s;
  white-space:nowrap;z-index:999;
}
#toast.show{opacity:1;}

/* ── MOBILE ── */
@media(max-width:600px) and (orientation:portrait){
  .g5,.g6,.gmany{grid-template-columns:1fr 1fr;}
  .g3 .tile:nth-child(3){max-width:100%;}
  .btn{width:44px;height:44px;font-size:.95rem;}
  .btn.end{width:50px;}
  #bar{gap:8px;}
}
@media(max-width:380px){
  #bar{gap:6px;padding:0 6px;}
  .btn{width:40px;height:40px;font-size:.88rem;}
}

/* 1 tile: giới hạn chiều cao để không to quá */
.g1 .tile{
  max-width:min(100%, calc((100vh - var(--bar-h) - 60px) * 16/9));
  max-height:calc(100vh - var(--bar-h) - 60px);
  justify-self:center;align-self:center;
  width:100%;
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>🎥 WebRTC Meet</h1>
  <p>Nhập tên rồi vào — không cần mã phòng</p>
  <input id="name-input" type="text" placeholder="Tên của bạn..." maxlength="24" autocomplete="off" />
  <button id="join-btn"><i class="fas fa-video"></i>&nbsp; Tham gia</button>
</div>

<!-- ROOM -->
<div id="room">
  <div id="video-grid" class="g1"></div>
  <div id="bar">
    <button class="btn" id="btn-mic"><i class="fas fa-microphone"></i></button>
    <button class="btn" id="btn-cam"><i class="fas fa-video"></i></button>
    <button class="btn" id="btn-swap"><i class="fas fa-sync-alt"></i></button>
    <button class="btn end" id="btn-end"><i class="fas fa-phone-slash"></i></button>
    <div id="badge"><i class="fas fa-users"></i><span id="cnt">1</span></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Socket.io: load runtime từ server để tương thích mọi version ───
(function loadSocketIO(){
  var s=document.createElement('script');
  s.src='/socket.io/socket.io.js';
  s.onload=init;
  s.onerror=function(){toast('Không tải được socket.io');};
  document.head.appendChild(s);
})();

// ─── GLOBALS ───
var socket,myId,myName='Guest';
var localStream=null;
var micOn=true,camOn=true;
var facing='user'; // 'user' | 'environment'
var swapping=false;
var peers={}; // id -> {pc,name,audioOn,videoOn}

var ICE={
  iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'turn:openrelay.metered.ca:80',
     username:'openrelayproject',credential:'openrelayproject'},
    {urls:'turn:openrelay.metered.ca:443',
     username:'openrelayproject',credential:'openrelayproject'},
    {urls:'turn:openrelay.metered.ca:443?transport=tcp',
     username:'openrelayproject',credential:'openrelayproject'}
  ],
  iceCandidatePoolSize:8
};

// ─── TOAST ───
var _toastTimer;
function toast(msg,dur){
  dur=dur||2500;
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){el.classList.remove('show');},dur);
}

// ─── GRID ───
function updateGrid(){
  var g=document.getElementById('video-grid');
  var n=g.children.length;
  g.className=
    n<=1?'g1':n===2?'g2':n===3?'g3':
    n===4?'g4':n===5?'g5':n===6?'g6':'gmany';
}

// ─── TILE ───
function makeTile(id,name,stream,isLocal){
  var tile=document.createElement('div');
  tile.className='tile';tile.id='tile-'+id;

  var video=document.createElement('video');
  video.autoplay=true;
  video.setAttribute('playsinline','');
  video.setAttribute('webkit-playsinline','');
  video.muted=isLocal;
  if(stream){video.srcObject=stream;safePlay(video);}

  var avatar=document.createElement('div');
  avatar.className='tile-avatar';
  avatar.innerHTML='<div class="av-circle"><i class="fas fa-user"></i></div>'
    +'<div class="av-name">'+esc(name)+'</div>';

  var bar=document.createElement('div');
  bar.className='tile-bar';

  var nameEl=document.createElement('div');
  nameEl.className='tile-name';
  nameEl.innerHTML='<i class="fas fa-user" style="font-size:.65rem"></i>'+esc(name)
    +(isLocal?' <span style="color:var(--dim)">(Bạn)</span>':'');

  var micIcon=document.createElement('div');
  micIcon.className='tile-mic-icon';
  micIcon.innerHTML='<i class="fas fa-microphone-slash"></i>';

  bar.appendChild(nameEl);bar.appendChild(micIcon);
  tile.append(video,avatar,bar);
  document.getElementById('video-grid').appendChild(tile);
  updateGrid();
  return tile;
}

function safePlay(video){
  var p=video.play();
  if(p&&p.catch)p.catch(function(){});
}

function removeTile(id){
  var t=document.getElementById('tile-'+id);
  if(t)t.remove();updateGrid();
}

function setTileMic(id,on){
  var t=document.getElementById('tile-'+id);if(!t)return;
  var ic=t.querySelector('.tile-mic-icon');
  if(ic)ic.classList.toggle('show',!on);
}

function setTileCam(id,on){
  var t=document.getElementById('tile-'+id);if(!t)return;
  var av=t.querySelector('.tile-avatar');
  var vid=t.querySelector('video');
  if(on){av.classList.remove('show');vid.style.visibility='visible';}
  else {av.classList.add('show');  vid.style.visibility='hidden';}
}

function updateCount(){
  document.getElementById('cnt').textContent=Object.keys(peers).length+1;
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── GET MEDIA ───
// Android: phải stop stream cũ TRƯỚC khi mở stream mới cùng loại camera
// iOS 12: không hỗ trợ facingMode exact → dùng ideal, fallback plain
function getMedia(facingMode,cb){
  var constraints={
    audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},
    video:{
      facingMode:{ideal:facingMode},
      width:{ideal:640,max:1280},height:{ideal:480,max:720},
      frameRate:{ideal:20,max:30}
    }
  };
  navigator.mediaDevices.getUserMedia(constraints)
  .then(function(s){cb(null,s);})
  .catch(function(){
    // fallback 1: bỏ facingMode constraint
    navigator.mediaDevices.getUserMedia({audio:true,video:{width:{ideal:640},height:{ideal:480}}})
    .then(function(s){cb(null,s);})
    .catch(function(){
      // fallback 2: chỉ audio
      navigator.mediaDevices.getUserMedia({audio:true,video:false})
      .then(function(s){cb(null,s);})
      .catch(function(e){cb(e,null);});
    });
  });
}

// ─── PEER CONNECTION ───
function createPC(remoteId,remoteName){
  if(peers[remoteId])return peers[remoteId].pc;
  var pc=new RTCPeerConnection(ICE);
  peers[remoteId]={pc:pc,name:remoteName,audioOn:true,videoOn:true};

  if(localStream){
    localStream.getTracks().forEach(function(t){pc.addTrack(t,localStream);});
  }

  pc.onicecandidate=function(e){
    if(e.candidate)socket.emit('ice-candidate',{to:remoteId,candidate:e.candidate});
  };

  pc.ontrack=function(e){
    var stream=e.streams&&e.streams[0];if(!stream)return;
    var tile=document.getElementById('tile-'+remoteId);
    if(!tile){
      tile=makeTile(remoteId,remoteName,null,false);
    }
    var vid=tile.querySelector('video');
    if(vid&&(!vid.srcObject||vid.srcObject.id!==stream.id)){
      vid.srcObject=stream;safePlay(vid);
    }
  };

  pc.onconnectionstatechange=function(){
    var st=pc.connectionState;
    console.log('[PC '+remoteName+']',st);
    if(st==='failed'&&pc.restartIce)setTimeout(function(){pc.restartIce();},1500);
  };

  return pc;
}

async function callPeer(remoteId,remoteName){
  if(peers[remoteId])return;
  var pc=createPC(remoteId,remoteName);
  if(!document.getElementById('tile-'+remoteId))makeTile(remoteId,remoteName,null,false);
  try{
    var offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:true});
    await pc.setLocalDescription(offer);
    socket.emit('offer',{to:remoteId,offer:offer});
  }catch(e){console.error('callPeer',e);}
}

async function handleOffer(fromId,fromName,offer){
  // Glare resolution: higher socket id becomes answerer
  if(peers[fromId]){
    if(myId>fromId){
      try{await peers[fromId].pc.setLocalDescription({type:'rollback'});}catch(e){}
    } else return;
  }
  var pc=createPC(fromId,fromName);
  if(!document.getElementById('tile-'+fromId))makeTile(fromId,fromName,null,false);
  try{
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    var answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer',{to:fromId,answer:answer});
  }catch(e){console.error('handleOffer',e);}
}

async function handleAnswer(fromId,answer){
  var p=peers[fromId];if(!p)return;
  try{
    if(p.pc.signalingState==='have-local-offer')
      await p.pc.setRemoteDescription(new RTCSessionDescription(answer));
  }catch(e){console.error('handleAnswer',e);}
}

async function handleICE(fromId,candidate){
  var p=peers[fromId];if(!p)return;
  try{await p.pc.addIceCandidate(new RTCIceCandidate(candidate));}
  catch(e){if(e.message&&e.message.indexOf('end-of-candidates')<0)console.warn('ICE',e.message);}
}

// ─── SWAP CAM (Android fix) ───
// Bước quan trọng: stop TOÀN BỘ video tracks của localStream TRƯỚC khi getUserMedia
function swapCam(){
  if(swapping)return;
  swapping=true;
  var icon=document.querySelector('#btn-swap i');
  icon.classList.add('fa-spin');

  var newFacing=facing==='user'?'environment':'user';

  // STOP old video tracks first — Android requirement
  if(localStream){
    localStream.getVideoTracks().forEach(function(t){t.stop();});
  }

  getMedia(newFacing,async function(err,newStream){
    icon.classList.remove('fa-spin');
    swapping=false;
    if(err||!newStream){
      toast('Không đổi được camera');
      console.error('swapCam',err);
      // try restore old camera
      getMedia(facing,function(e2,s2){
        if(s2)applyNewStream(s2,facing);
      });
      return;
    }
    await applyNewStream(newStream,newFacing);
    toast(newFacing==='user'?'📷 Camera trước':'📷 Camera sau');
  });
}

async function applyNewStream(newStream,newFacing){
  var newVid=newStream.getVideoTracks()[0];

  // replaceTrack in all PCs
  var ids=Object.keys(peers);
  for(var i=0;i<ids.length;i++){
    var pc=peers[ids[i]].pc;
    var senders=pc.getSenders();
    for(var j=0;j<senders.length;j++){
      if(senders[j].track&&senders[j].track.kind==='video'){
        try{await senders[j].replaceTrack(newVid||null);}catch(e){console.warn('replaceTrack',e);}
        break;
      }
    }
  }

  // Update localStream reference
  // Remove old video tracks from localStream
  localStream.getVideoTracks().forEach(function(t){
    try{localStream.removeTrack(t);}catch(e){}
  });
  if(newVid)localStream.addTrack(newVid);

  // Stop extra audio from newStream (we keep existing audio track)
  newStream.getAudioTracks().forEach(function(t){t.stop();});

  // Update local tile
  var localTile=document.getElementById('tile-local');
  if(localTile){
    var vid=localTile.querySelector('video');
    if(vid){vid.srcObject=localStream;safePlay(vid);}
  }

  facing=newFacing;

  // Re-apply cam mute state
  localStream.getVideoTracks().forEach(function(t){t.enabled=camOn;});
}

// ─── CONTROLS ───
function toggleMic(){
  micOn=!micOn;
  if(localStream)localStream.getAudioTracks().forEach(function(t){t.enabled=micOn;});
  var btn=document.getElementById('btn-mic');
  btn.classList.toggle('off',!micOn);
  btn.innerHTML=micOn?'<i class="fas fa-microphone"></i>':'<i class="fas fa-microphone-slash"></i>';
  setTileMic('local',micOn);
  if(socket)socket.emit('media-state',{video:camOn,audio:micOn});
  toast(micOn?'Mic bật':'Mic tắt');
}

function toggleCam(){
  camOn=!camOn;
  if(localStream)localStream.getVideoTracks().forEach(function(t){t.enabled=camOn;});
  var btn=document.getElementById('btn-cam');
  btn.classList.toggle('off',!camOn);
  btn.innerHTML=camOn?'<i class="fas fa-video"></i>':'<i class="fas fa-video-slash"></i>';
  setTileCam('local',camOn);
  if(socket)socket.emit('media-state',{video:camOn,audio:micOn});
  toast(camOn?'Camera bật':'Camera tắt');
}

function leaveRoom(){
  Object.keys(peers).forEach(function(id){
    peers[id].pc.close();delete peers[id];
  });
  if(localStream){localStream.getTracks().forEach(function(t){t.stop();});localStream=null;}
  if(socket){socket.disconnect();socket=null;}
  document.getElementById('video-grid').innerHTML='';
  document.getElementById('room').style.display='none';
  document.getElementById('lobby').style.display='flex';
  micOn=true;camOn=true;facing='user';
}

// ─── JOIN ───
function init(){
  document.getElementById('join-btn').onclick=joinRoom;
  document.getElementById('name-input').onkeydown=function(e){if(e.key==='Enter')joinRoom();};
  document.getElementById('btn-mic').onclick=toggleMic;
  document.getElementById('btn-cam').onclick=toggleCam;
  document.getElementById('btn-swap').onclick=swapCam;
  document.getElementById('btn-end').onclick=leaveRoom;
  document.addEventListener('dblclick',function(e){e.preventDefault();},{passive:false});
}

function joinRoom(){
  myName=document.getElementById('name-input').value.trim()||'Guest';
  document.getElementById('lobby').style.display='none';
  document.getElementById('room').style.display='flex';

  getMedia(facing,function(err,stream){
    if(err){toast('Không truy cập được camera/mic');console.error(err);}
    else{localStream=stream;}

    makeTile('local',myName,localStream,true);

    // iOS 12 CRITICAL: chỉ dùng polling trước, upgrade sau
    // Tránh lỗi WebSocket handshake trên iOS 12 Safari
    socket=io({
      transports:['polling','websocket'],
      upgrade:true,
      rememberUpgrade:false,
      timeout:10000,
      reconnection:true,
      reconnectionAttempts:5,
      reconnectionDelay:1000
    });

    socket.on('connect',function(){
      myId=socket.id;
      socket.emit('join',{name:myName});
      updateCount();
    });

    socket.on('existing-users',function(users){
      users.forEach(function(u){callPeer(u.id,u.name);});
      updateCount();
    });

    socket.on('user-joined',function(u){
      toast(u.name+' đã tham gia');
      updateCount();
    });

    socket.on('offer',function(d){
      var name=peers[d.from]?peers[d.from].name:'Guest';
      handleOffer(d.from,name,d.offer);
      updateCount();
    });

    socket.on('answer',function(d){handleAnswer(d.from,d.answer);});
    socket.on('ice-candidate',function(d){handleICE(d.from,d.candidate);});

    socket.on('peer-media-state',function(d){
      if(peers[d.id]){peers[d.id].audioOn=d.audio;peers[d.id].videoOn=d.video;}
      setTileMic(d.id,d.audio);
      setTileCam(d.id,d.video);
    });

    socket.on('user-left',function(d){
      var name=peers[d.id]?peers[d.id].name:'Người dùng';
      toast(name+' đã rời phòng');
      if(peers[d.id]){peers[d.id].pc.close();delete peers[d.id];}
      removeTile(d.id);updateCount();
    });

    socket.on('disconnect',function(){toast('Mất kết nối...');});
    socket.on('reconnect',function(){
      toast('Đã kết nối lại');
      socket.emit('join',{name:myName});
    });
  });
}
</script>
</body>
</html>
