<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Đa Người Dùng WebRTC - Bật/Tắt Cam & Mic</title>
    <!-- Socket.IO & Simple-Peer CDN -->
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        /* CSS XẤU NHƯNG ĐẦY ĐỦ CHỨC NĂNG */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #2c2f33;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 12px;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: #23272a;
            padding: 12px 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 #1a1c1e;
        }
        h1 {
            color: #ffb347;
            font-size: 1.7rem;
            text-shadow: 3px 3px 0 #7e2e00;
            letter-spacing: 2px;
        }
        .status-badge {
            background: #5865f2;
            padding: 8px 18px;
            border-radius: 100px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: inset 0 -2px 0 #3c45a3;
        }
        .controls-panel {
            background: #40444b;
            padding: 15px 20px;
            border-radius: 40px;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
            border: 2px solid #ffae42;
        }
        button {
            background: #7289da;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #4b5a9c;
            font-family: monospace;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #4b5a9c;
        }
        .cam-btn {
            background: #2ecc71;
            box-shadow: 0 4px 0 #229954;
        }
        .cam-btn.off {
            background: #e67e22;
            box-shadow: 0 4px 0 #b45f1b;
        }
        .mic-btn {
            background: #3498db;
            box-shadow: 0 4px 0 #1f618d;
        }
        .mic-btn.off {
            background: #e74c3c;
            box-shadow: 0 4px 0 #b03a2e;
        }
        /* grid video - ugly but functional */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 15px;
            padding: 8px;
        }
        .video-card {
            background: #1e2124;
            border-radius: 24px;
            overflow: hidden;
            border: 3px solid #ffb347;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
            transition: 0.05s linear;
        }
        .video-label {
            background: #000000aa;
            backdrop-filter: blur(4px);
            color: #ffd966;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid orange;
            font-family: monospace;
        }
        video {
            width: 100%;
            background: #111;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            transform: scaleX(1);
        }
        .local-video video {
            border: 3px solid #f1c40f;
        }
        .footer-info {
            margin-top: 28px;
            text-align: center;
            color: #aaa;
            font-size: 13px;
            background: #23272a;
            padding: 12px;
            border-radius: 30px;
        }
        @media (max-width: 700px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            button {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🎥 WEBCAM ĐA NGƯỜI DÙNG 🎙️</h1>
        <div class="status-badge" id="connectionStatus">Đang kết nối...</div>
    </div>
    <div class="controls-panel">
        <button id="toggleCamBtn" class="cam-btn">📷 TẮT CAMERA</button>
        <button id="toggleMicBtn" class="mic-btn">🎤 TẮT MICROPHONE</button>
    </div>
    <div id="videoGrid" class="video-grid">
        <!-- video của local và remote sẽ được thêm vào đây -->
    </div>
    <div class="footer-info">
        💡 Mẹo: Mở nhiều tab hoặc trình duyệt khác nhau để test nhiều người. <br>
        ✅ Bật/tắt cam & mic hoạt động ngay lập tức cho tất cả người tham gia.
    </div>
</div>

<script>
    // -------------------- CẤU HÌNH & BIẾN TOÀN CỤC --------------------
    const roomName = "phonghopchinh";   // phòng đa người dùng
    const socket = io();                // kết nối socket.io tới server nodejs

    // Local stream (camera + microphone)
    let localStream = null;
    let localVideoElement = null;
    let localUserId = null;

    // Quản lý peer connections { peerId: simplePeerInstance }
    const peersMap = new Map();
    // Quản lý các video element của remote (để xóa khi user rời)
    const remoteVideoElements = new Map(); // peerId -> <video>

    // UI elements
    const videoGrid = document.getElementById('videoGrid');
    const toggleCamBtn = document.getElementById('toggleCamBtn');
    const toggleMicBtn = document.getElementById('toggleMicBtn');
    const statusSpan = document.getElementById('connectionStatus');

    // Trạng thái camera & mic (dùng để hiển thị nút)
    let isCameraOn = true;
    let isMicOn = true;

    // -------------------- HÀM HỖ TRỢ UI --------------------
    function updateLocalUI() {
        // Cập nhật text + style cho nút camera
        if (isCameraOn) {
            toggleCamBtn.textContent = "📷 TẮT CAMERA";
            toggleCamBtn.classList.remove("off");
        } else {
            toggleCamBtn.textContent = "📷 BẬT CAMERA";
            toggleCamBtn.classList.add("off");
        }
        // Microphone
        if (isMicOn) {
            toggleMicBtn.textContent = "🎤 TẮT MICROPHONE";
            toggleMicBtn.classList.remove("off");
        } else {
            toggleMicBtn.textContent = "🎤 BẬT MICROPHONE";
            toggleMicBtn.classList.add("off");
        }
    }

    // Tạo thẻ video cho local (luôn hiển thị riêng)
    function createLocalVideoElement() {
        const card = document.createElement('div');
        card.className = 'video-card local-video';
        card.id = 'localVideoCard';
        const label = document.createElement('div');
        label.className = 'video-label';
        label.innerText = '✨ BẠN (Local) ✨';
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;   // tránh hồi âm
        video.volume = 0;
        card.appendChild(label);
        card.appendChild(video);
        videoGrid.prepend(card); // ưu tiên hiển thị đầu tiên
        return video;
    }

    // Tạo video element cho remote user
    function createRemoteVideoElement(peerId, displayName = null) {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.id = `remoteCard-${peerId}`;
        const label = document.createElement('div');
        label.className = 'video-label';
        label.innerText = displayName ? `👤 ${displayName}` : `👤 Người dùng: ${peerId.substring(0, 6)}`;
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        card.appendChild(label);
        card.appendChild(video);
        videoGrid.appendChild(card);
        remoteVideoElements.set(peerId, { card, video, label });
        return video;
    }

    // Xóa remote video + peer connection
    function removeRemotePeer(peerId) {
        if (peersMap.has(peerId)) {
            const peer = peersMap.get(peerId);
            peer.destroy();
            peersMap.delete(peerId);
        }
        // Xóa phần tử HTML
        const elements = remoteVideoElements.get(peerId);
        if (elements) {
            if (elements.card && elements.card.parentNode) elements.card.parentNode.removeChild(elements.card);
            remoteVideoElements.delete(peerId);
        }
    }

    // Xóa tất cả remote peer (khi cần reset, nhưng không cần reset thường xuyên)
    function removeAllRemotePeers() {
        for (let [peerId, peer] of peersMap.entries()) {
            peer.destroy();
            const el = remoteVideoElements.get(peerId);
            if (el && el.card) el.card.remove();
        }
        peersMap.clear();
        remoteVideoElements.clear();
    }

    // -------------------- HÀM XỬ LÝ BẬT/TẮT CAM & MIC TRÊN LOCAL STREAM --------------------
    function toggleCamera() {
        if (!localStream) return;
        const videoTracks = localStream.getVideoTracks();
        if (videoTracks.length === 0) {
            console.warn("Không có track video");
            return;
        }
        isCameraOn = !isCameraOn;
        videoTracks.forEach(track => {
            track.enabled = isCameraOn;
        });
        updateLocalUI();
        // Không cần renegotiation vì track.enabled tự động gửi black frame hoặc dừng
    }

    function toggleMicrophone() {
        if (!localStream) return;
        const audioTracks = localStream.getAudioTracks();
        if (audioTracks.length === 0) return;
        isMicOn = !isMicOn;
        audioTracks.forEach(track => {
            track.enabled = isMicOn;
        });
        updateLocalUI();
    }

    // -------------------- TẠO PEER (SIMPLE-PEER) --------------------
    // Hàm tạo peer connection tới một userId khác
    // @param {string} targetUserId - id của peer đích
    // @param {boolean} initiator - true nếu bên này chủ động khởi tạo offer
    function createPeerConnection(targetUserId, initiator) {
        // Tránh tạo trùng lặp
        if (peersMap.has(targetUserId)) {
            console.warn(`Peer ${targetUserId} đã tồn tại, không tạo lại.`);
            return peersMap.get(targetUserId);
        }

        const peer = new SimplePeer({
            initiator: initiator,
            stream: localStream,
            trickle: true,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        // Lưu vào map
        peersMap.set(targetUserId, peer);

        // Xử lý signal (gửi qua socket)
        peer.on('signal', (signalData) => {
            socket.emit('signal', {
                to: targetUserId,
                signal: signalData
            });
        });

        // Khi nhận được stream từ remote
        peer.on('stream', (remoteStream) => {
            console.log(`Nhận stream từ ${targetUserId}`);
            let videoElem = null;
            // Kiểm tra nếu đã có video element cho peer này chưa
            const existing = remoteVideoElements.get(targetUserId);
            if (existing && existing.video) {
                videoElem = existing.video;
            } else {
                // Tạo mới video và gắn stream
                videoElem = createRemoteVideoElement(targetUserId);
                const elements = remoteVideoElements.get(targetUserId);
                if (elements) elements.video = videoElem;
            }
            if (videoElem) {
                videoElem.srcObject = remoteStream;
                videoElem.play().catch(e => console.warn("Lỗi play video", e));
            }
        });

        peer.on('error', (err) => {
            console.error(`Lỗi peer với ${targetUserId}:`, err);
        });

        peer.on('close', () => {
            console.log(`Peer đóng với ${targetUserId}`);
            removeRemotePeer(targetUserId);
        });

        return peer;
    }

    // -------------------- XỬ LÝ SOCKET & THAM GIA PHÒNG --------------------
    function initSocketAndJoin() {
        // Khi kết nối thành công tới server
        socket.on('connect', () => {
            console.log('Đã kết nối Socket.IO, id:', socket.id);
            localUserId = socket.id;
            statusSpan.innerText = `✅ Đã vào phòng | ID: ${socket.id.substring(0, 6)}`;
            // Tham gia phòng
            socket.emit('join-room', roomName);
        });

        // Nhận danh sách người dùng hiện tại (khi mới vào)
        socket.on('existing-users', (users) => {
            console.log('Danh sách người dùng hiện tại:', users);
            // Với mỗi user đã tồn tại (không phải mình), tạo peer initiator=true (chủ động offer)
            users.forEach(userId => {
                if (userId !== localUserId && !peersMap.has(userId)) {
                    console.log(`Tạo peer (initiator) tới user cũ: ${userId}`);
                    createPeerConnection(userId, true);
                }
            });
        });

        // Có người dùng mới tham gia phòng
        socket.on('user-connected', (newUserId) => {
            if (newUserId === localUserId) return;
            console.log(`Người dùng mới tham gia: ${newUserId}`);
            // Kiểm tra nếu chưa có peer thì tạo với initiator=false (vì người mới sẽ chủ động offer)
            // Theo chuẩn: user mới (newUserId) sẽ tạo peer initiator=true tới mọi người, 
            // còn những user cũ sẽ tạo peer initiator=false để nhận offer.
            if (!peersMap.has(newUserId)) {
                console.log(`Tạo peer (non-initiator) dành cho user mới: ${newUserId}`);
                createPeerConnection(newUserId, false);
            }
        });

        // Nhận signal (SDP, ICE candidate) từ server gửi tới
        socket.on('signal', async (data) => {
            const { from, signal } = data;
            if (!from) return;
            console.log(`Nhận signal từ ${from}`);
            // Kiểm tra nếu chưa tồn tại peer thì tạo peer với initiator=false (trường hợp nhận signal trước user-connected)
            let peer = peersMap.get(from);
            if (!peer) {
                console.log(`Chưa có peer với ${from}, tạo mới với initiator=false để xử lý signal`);
                peer = createPeerConnection(from, false);
            }
            // Gửi signal vào peer (quan trọng)
            if (signal) {
                peer.signal(signal);
            }
        });

        // Khi có người rời phòng
        socket.on('user-disconnected', (disconnectedUserId) => {
            if (disconnectedUserId === localUserId) return;
            console.log(`Người dùng rời: ${disconnectedUserId}`);
            removeRemotePeer(disconnectedUserId);
        });

        // Lỗi socket
        socket.on('disconnect', () => {
            statusSpan.innerText = '⚠️ Mất kết nối server! F5 tải lại.';
            console.warn('Socket disconnected');
        });

        socket.on('connect_error', (err) => {
            console.error('Lỗi kết nối socket:', err);
            statusSpan.innerText = '❌ Không kết nối được server.';
        });
    }

    // -------------------- KHỞI TẠO MEDIA (CAM + MIC) --------------------
    async function initLocalMedia() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            });
            localStream = stream;
            // Hiển thị local video
            const videoEl = createLocalVideoElement();
            localVideoElement = videoEl;
            videoEl.srcObject = localStream;
            videoEl.play().catch(e => console.warn("local play error", e));

            // Trạng thái ban đầu: camera và mic đều bật
            isCameraOn = true;
            isMicOn = true;
            updateLocalUI();

            // Gán sự kiện cho nút
            toggleCamBtn.onclick = () => toggleCamera();
            toggleMicBtn.onclick = () => toggleMicrophone();

            // Sau khi có local stream, mới tham gia socket và xử lý kết nối
            initSocketAndJoin();

        } catch (err) {
            console.error("Không thể truy cập camera/microphone:", err);
            statusSpan.innerText = '⚠️ Cần cấp quyền cam & mic!';
            alert("Lỗi: Không thể lấy camera/micro. Vui lòng cấp quyền và tải lại trang.");
            // Tạo fake? không, nhưng vẫn cho phép join text (ko có video)
            // tạo stream rỗng? nhưng để tránh lỗi, ta vẫn cho socket join mà không có media? sẽ lỗi peer stream null.
            // Thay vào đó ta vẫn khởi tạo nhưng không có stream thực tế => không gửi video.
            // Không nên, nhưng yêu cầu cam/mic là cần, nếu không có thì báo lỗi thoát.
            // Tạo fake stream chỉ audio? nhưng thôi, dừng.
            // Nhưng để demo vẫn chạy: tạo stream rỗng nhưng sẽ gây lỗi. Ta throw.
            throw err;
        }
    }

    // -------------------- KHỞI ĐỘNG APP --------------------
    window.addEventListener('load', () => {
        initLocalMedia().catch(() => {
            // Nếu lỗi quyền, tạo div thông báo
            const errDiv = document.createElement('div');
            errDiv.style.background = 'red';
            errDiv.style.padding = '20px';
            errDiv.style.color = 'white';
            errDiv.innerHTML = '❌ KHÔNG THỂ TRUY CẬP CAMERA/MICROPHONE. HÃY CẤP QUYỀN VÀ REFRESH TRANG.';
            videoGrid.innerHTML = '';
            videoGrid.appendChild(errDiv);
            statusSpan.innerText = 'LỖI PERMISSION';
        });
    });

    // Cleanup khi rời trang (optional)
    window.addEventListener('beforeunload', () => {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        for (let [_, peer] of peersMap.entries()) {
            peer.destroy();
        }
        if (socket) socket.disconnect();
    });
</script>
</body>
</html>
