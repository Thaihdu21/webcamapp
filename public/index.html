<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>RTC Đa Người Dùng</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2e2e40;
    --accent: #4f8ef7;
    --red: #e05252;
    --green: #4caf7d;
    --text: #e8e8f0;
    --subtext: #888;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    z-index: 100;
  }
  #header h1 { font-size: 15px; font-weight: 600; letter-spacing: .3px; }
  #user-count {
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  /* ── VIDEO GRID ── */
  #video-grid {
    position: fixed;
    top: 52px;
    bottom: 80px;
    left: 0; right: 0;
    display: grid;
    gap: 4px;
    padding: 6px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transition: grid-template-columns 0.3s;
  }

  /* Grid layout động theo số người */
  #video-grid.n1 { grid-template-columns: 1fr; }
  #video-grid.n2 { grid-template-columns: 1fr 1fr; }
  #video-grid.n3 { grid-template-columns: 1fr 1fr; }
  #video-grid.n4 { grid-template-columns: 1fr 1fr; }
  #video-grid.n5,
  #video-grid.n6 { grid-template-columns: 1fr 1fr; }
  #video-grid.n7,
  #video-grid.n8,
  #video-grid.n9 { grid-template-columns: 1fr 1fr 1fr; }

  /* ── VIDEO CARD ── */
  .video-card {
    position: relative;
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 4/3;
  }

  .video-card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #000;
    /* Quan trọng cho iOS */
    -webkit-playsinline: true;
    transform: translateZ(0);
  }

  .video-card .label {
    position: absolute;
    bottom: 6px; left: 8px;
    font-size: 11px;
    background: rgba(0,0,0,0.55);
    padding: 2px 8px;
    border-radius: 20px;
    color: #fff;
    font-weight: 500;
    pointer-events: none;
  }

  /* Cam tắt overlay */
  .cam-off-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: #111;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: var(--subtext);
    font-size: 13px;
  }
  .cam-off-overlay .avatar {
    width: 52px; height: 52px;
    background: var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .video-card.cam-off .cam-off-overlay { display: flex; }
  .video-card.cam-off video { opacity: 0; }

  /* ── CONTROLS ── */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 100;
    /* iOS safe area */
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .btn-ctrl {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: background 0.2s, transform 0.1s;
    background: var(--border);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
  }
  .btn-ctrl:active { transform: scale(0.9); }
  .btn-ctrl.off { background: var(--red); color: #fff; }
  .btn-ctrl.swap { background: #2e2e50; font-size: 20px; }
  .btn-ctrl.swap:active { background: var(--accent); }

  /* Status toast */
  #toast {
    position: fixed;
    top: 62px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(30,30,50,0.92);
    color: var(--text);
    font-size: 13px;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Connecting indicator */
  .connecting-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f0a500;
    margin-right: 6px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Mobile landscape */
  @media (orientation: landscape) and (max-height: 500px) {
    #video-grid { bottom: 60px; }
    #controls { height: 60px; }
    .btn-ctrl { width: 44px; height: 44px; font-size: 18px; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>📡 RTC Live</h1>
  <span id="user-count">1 người</span>
</div>

<div id="video-grid" class="n1"></div>

<div id="controls">
  <button class="btn-ctrl" id="btn-mic"  title="Mic">🎙️</button>
  <button class="btn-ctrl" id="btn-cam"  title="Cam">📹</button>
  <button class="btn-ctrl swap" id="btn-swap" title="Đổi camera">🔄</button>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    // Free TURN — tăng khả năng kết nối qua NAT/mobile
    {
      urls: 'turn:openrelay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443?transport=tcp',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ]
};

// Giảm chất lượng cho thiết bị yếu
const CONSTRAINTS = {
  video: {
    width: { ideal: 640, max: 1280 },
    height: { ideal: 480, max: 720 },
    frameRate: { ideal: 20, max: 30 },
    facingMode: 'user'
  },
  audio: {
    echoCancellation: true,
    noiseSuppression: true,
    autoGainControl: true,
    sampleRate: 16000
  }
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const socket = io({ transports: ['websocket', 'polling'] });
const peers = new Map();          // peerId -> { pc, stream }
const pendingCandidates = new Map(); // peerId -> [candidates]
let localStream = null;
let micOn = true;
let camOn = true;
let facingMode = 'user';
let makingOffer = false;

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}

function updateGrid() {
  const grid = document.getElementById('video-grid');
  const total = grid.children.length;
  grid.className = `n${Math.min(total, 9)}`;
  document.getElementById('user-count').textContent = `${total} người`;
}

function createVideoCard(id, stream, label = '') {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.id = `card-${id}`;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;           // iOS bắt buộc
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.muted = (id === 'local');     // Local video phải mute
  video.srcObject = stream;

  // Đảm bảo video play sau khi set srcObject (iOS quirk)
  video.onloadedmetadata = () => video.play().catch(() => {});

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = label || id.slice(0, 6);

  const overlay = document.createElement('div');
  overlay.className = 'cam-off-overlay';
  overlay.innerHTML = `<div class="avatar">👤</div><span>Cam tắt</span>`;

  card.appendChild(video);
  card.appendChild(lbl);
  card.appendChild(overlay);
  return card;
}

function addVideoCard(id, stream, label) {
  const grid = document.getElementById('video-grid');
  if (document.getElementById(`card-${id}`)) return;
  const card = createVideoCard(id, stream, label);
  grid.appendChild(card);
  updateGrid();
}

function removeVideoCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.remove();
  updateGrid();
}

// ─────────────────────────────────────────────
//  LOCAL MEDIA
// ─────────────────────────────────────────────
async function getLocalStream(constraints = CONSTRAINTS) {
  try {
    return await navigator.mediaDevices.getUserMedia(constraints);
  } catch (e) {
    // Fallback: thử video only
    try {
      return await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    } catch (e2) {
      showToast('⚠️ Không truy cập được camera/mic');
      return null;
    }
  }
}

async function init() {
  showToast('⏳ Đang mở camera…', 5000);
  localStream = await getLocalStream();
  if (!localStream) return;

  addVideoCard('local', localStream, 'Bạn');
  showToast('✅ Camera sẵn sàng');
  socket.connect();
}

// ─────────────────────────────────────────────
//  WEBRTC PEER
// ─────────────────────────────────────────────
function createPeer(peerId, polite) {
  const pc = new RTCPeerConnection(ICE_SERVERS);

  // Add local tracks
  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  // Nhận stream từ peer
  pc.ontrack = (e) => {
    const stream = e.streams[0];
    if (!stream) return;
    const card = document.getElementById(`card-${peerId}`);
    if (card) {
      const v = card.querySelector('video');
      if (v.srcObject !== stream) {
        v.srcObject = stream;
        v.play().catch(() => {});
      }
    } else {
      addVideoCard(peerId, stream);
    }
  };

  // ICE candidate
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      socket.emit('ice-candidate', { to: peerId, candidate });
    }
  };

  // ICE connection state — hiển thị trạng thái
  pc.oniceconnectionstatechange = () => {
    console.log(`[${peerId.slice(0,6)}] ICE:`, pc.iceConnectionState);
    if (pc.iceConnectionState === 'failed') {
      pc.restartIce();
    }
    if (pc.iceConnectionState === 'disconnected') {
      setTimeout(() => {
        if (pc.iceConnectionState === 'disconnected') pc.restartIce();
      }, 3000);
    }
  };

  pc.onconnectionstatechange = () => {
    console.log(`[${peerId.slice(0,6)}] Connection:`, pc.connectionState);
    if (['failed', 'closed'].includes(pc.connectionState)) {
      cleanupPeer(peerId);
    }
  };

  // Negotiation needed (Perfect Negotiation)
  pc.onnegotiationneeded = async () => {
    if (!polite) return; // chỉ impolite peer tạo offer
    try {
      makingOffer = true;
      await pc.setLocalDescription();
      socket.emit('offer', { to: peerId, offer: pc.localDescription });
    } catch (e) {
      console.error('onnegotiationneeded error:', e);
    } finally {
      makingOffer = false;
    }
  };

  peers.set(peerId, { pc, polite });
  return pc;
}

async function callPeer(peerId) {
  // Ta là người gọi = impolite
  const pc = createPeer(peerId, false);
  addVideoCard(peerId, new MediaStream(), `<span class="connecting-dot"></span>${peerId.slice(0,6)}`);

  try {
    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: true
    });
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: peerId, offer: pc.localDescription });
  } catch (e) {
    console.error('callPeer error:', e);
  }
}

function cleanupPeer(peerId) {
  const p = peers.get(peerId);
  if (p) {
    p.pc.close();
    peers.delete(peerId);
  }
  pendingCandidates.delete(peerId);
  removeVideoCard(peerId);
}

// ─────────────────────────────────────────────
//  SIGNALING HANDLERS (Perfect Negotiation)
// ─────────────────────────────────────────────
socket.on('existing-users', (userIds) => {
  userIds.forEach(id => callPeer(id));
});

socket.on('user-joined', (userId) => {
  // Người mới vào — họ sẽ gọi ta (polite = ta)
  // Ta tạo sẵn peer nhưng chờ offer từ họ
  if (!peers.has(userId)) {
    createPeer(userId, true);
    addVideoCard(userId, new MediaStream(), userId.slice(0, 6));
  }
  showToast(`👋 Có người vào (${userId.slice(0,4)})`);
});

socket.on('offer', async ({ from, offer }) => {
  let peerData = peers.get(from);
  if (!peerData) {
    // Tạo peer nếu chưa có (edge case)
    createPeer(from, true);
    peerData = peers.get(from);
    addVideoCard(from, new MediaStream(), from.slice(0, 6));
  }
  const { pc, polite } = peerData;
  const offerCollision = makingOffer || pc.signalingState !== 'stable';

  if (!polite && offerCollision) {
    return; // impolite peer bỏ qua offer va chạm
  }

  try {
    await pc.setRemoteDescription(offer);
    // Flush pending ICE candidates
    const queued = pendingCandidates.get(from) || [];
    for (const c of queued) {
      await pc.addIceCandidate(c).catch(() => {});
    }
    pendingCandidates.delete(from);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer: pc.localDescription });
  } catch (e) {
    console.error('offer handler error:', e);
  }
});

socket.on('answer', async ({ from, answer }) => {
  const p = peers.get(from);
  if (!p) return;
  try {
    if (p.pc.signalingState !== 'have-local-offer') return;
    await p.pc.setRemoteDescription(answer);
    // Flush pending ICE
    const queued = pendingCandidates.get(from) || [];
    for (const c of queued) {
      await p.pc.addIceCandidate(c).catch(() => {});
    }
    pendingCandidates.delete(from);
  } catch (e) {
    console.error('answer handler error:', e);
  }
});

socket.on('ice-candidate', async ({ from, candidate }) => {
  const p = peers.get(from);
  if (!p) return;
  const c = new RTCIceCandidate(candidate);
  if (p.pc.remoteDescription && p.pc.remoteDescription.type) {
    await p.pc.addIceCandidate(c).catch(() => {});
  } else {
    // Queue lại — chưa có remoteDescription
    if (!pendingCandidates.has(from)) pendingCandidates.set(from, []);
    pendingCandidates.get(from).push(c);
  }
});

socket.on('user-left', (userId) => {
  cleanupPeer(userId);
  showToast(`👋 ${userId.slice(0,4)} đã rời`);
});

socket.on('disconnect', () => {
  showToast('⚠️ Mất kết nối server, đang thử lại…', 5000);
});

socket.on('connect', () => {
  showToast('🟢 Đã kết nối', 1500);
});

// ─────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────
document.getElementById('btn-mic').addEventListener('click', () => {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = document.getElementById('btn-mic');
  btn.textContent = micOn ? '🎙️' : '🔇';
  btn.classList.toggle('off', !micOn);
  showToast(micOn ? '🎙️ Mic bật' : '🔇 Mic tắt', 1500);
});

document.getElementById('btn-cam').addEventListener('click', async () => {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  const btn = document.getElementById('btn-cam');
  btn.textContent = camOn ? '📹' : '🚫';
  btn.classList.toggle('off', !camOn);
  const card = document.getElementById('card-local');
  if (card) card.classList.toggle('cam-off', !camOn);
  showToast(camOn ? '📹 Cam bật' : '🚫 Cam tắt', 1500);
});

document.getElementById('btn-swap').addEventListener('click', async () => {
  if (!localStream) return;
  facingMode = facingMode === 'user' ? 'environment' : 'user';

  try {
    const newConstraints = {
      ...CONSTRAINTS,
      video: { ...CONSTRAINTS.video, facingMode }
    };
    const newStream = await navigator.mediaDevices.getUserMedia(newConstraints);
    const newVideoTrack = newStream.getVideoTracks()[0];

    // Thay track trong tất cả peer connections
    peers.forEach(({ pc }) => {
      const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) sender.replaceTrack(newVideoTrack).catch(() => {});
    });

    // Thay local track
    const oldVideoTrack = localStream.getVideoTracks()[0];
    if (oldVideoTrack) {
      localStream.removeTrack(oldVideoTrack);
      oldVideoTrack.stop();
    }
    localStream.addTrack(newVideoTrack);

    // Cập nhật local video
    const localVideo = document.querySelector('#card-local video');
    if (localVideo) {
      localVideo.srcObject = localStream;
      localVideo.play().catch(() => {});
    }

    showToast(facingMode === 'user' ? '🤳 Camera trước' : '📷 Camera sau', 1500);
  } catch (e) {
    console.error('swap camera error:', e);
    facingMode = facingMode === 'user' ? 'environment' : 'user'; // revert
    showToast('⚠️ Không đổi được camera', 2000);
  }
});

// ─────────────────────────────────────────────
//  KHỞI ĐỘNG
// ─────────────────────────────────────────────
init();
</script>
</body>
</html>
