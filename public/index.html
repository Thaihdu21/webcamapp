<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Multi-User</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0f0f1a;
        color: #fff;
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #1a1a2e;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #2a2a4a;
      }

      header h1 {
        font-size: 1.1rem;
        color: #a78bfa;
        letter-spacing: 1px;
      }

      #status {
        font-size: 0.8rem;
        color: #6ee7b7;
        background: #064e3b22;
        border: 1px solid #6ee7b744;
        padding: 4px 12px;
        border-radius: 99px;
      }

      #status.error {
        color: #fca5a5;
        border-color: #fca5a544;
      }

      /* Grid video */
      #video-grid {
        flex: 1;
        display: grid;
        gap: 10px;
        padding: 16px;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        align-content: start;
      }

      .video-wrapper {
        position: relative;
        background: #1a1a2e;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 16/9;
        border: 1px solid #2a2a4a;
        transition: border-color 0.3s;
      }

      .video-wrapper.speaking {
        border-color: #a78bfa;
      }

      .video-wrapper video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: #000;
      }

      .video-wrapper .label {
        position: absolute;
        bottom: 8px;
        left: 10px;
        font-size: 0.72rem;
        background: #0008;
        padding: 2px 8px;
        border-radius: 6px;
        color: #e2e8f0;
        pointer-events: none;
        max-width: 80%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .video-wrapper .cam-off-overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        flex-direction: column;
        gap: 8px;
        color: #6b7280;
        font-size: 0.85rem;
      }

      .video-wrapper .cam-off-overlay svg {
        width: 48px;
        height: 48px;
        opacity: 0.4;
      }

      .video-wrapper.cam-off .cam-off-overlay {
        display: flex;
      }

      /* Controls */
      #controls {
        background: #1a1a2e;
        border-top: 1px solid #2a2a4a;
        padding: 14px 24px;
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .btn {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 10px 20px;
        border-radius: 99px;
        border: none;
        cursor: pointer;
        font-size: 0.88rem;
        font-weight: 600;
        transition: all 0.2s;
        outline: none;
      }

      .btn svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .btn-cam {
        background: #312e81;
        color: #c4b5fd;
        border: 1px solid #4c1d95;
      }

      .btn-cam:hover {
        background: #3730a3;
      }

      .btn-cam.off {
        background: #1f2937;
        color: #6b7280;
        border-color: #374151;
      }

      .btn-mic {
        background: #064e3b;
        color: #6ee7b7;
        border: 1px solid #065f46;
      }

      .btn-mic:hover {
        background: #065f46;
      }

      .btn-mic.off {
        background: #1f2937;
        color: #6b7280;
        border-color: #374151;
      }

      /* Swap cam button — chỉ hiện trên mobile có nhiều camera */
      .btn-swap {
        background: #1e3a5f;
        color: #93c5fd;
        border: 1px solid #1d4ed8;
        display: none; /* ẩn mặc định, JS bật nếu có camera sau/trước */
      }

      .btn-swap:hover {
        background: #1e40af;
      }

      .btn-swap.swapping svg {
        animation: spin 0.4s linear;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      #peer-count {
        font-size: 0.82rem;
        color: #94a3b8;
        align-self: center;
      }

      /* Responsive: 1 người full, 2 người 2 cột, nhiều hơn auto */
      @media (max-width: 500px) {
        #video-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🎥 WebRTC Room</h1>
      <span id="status">Đang kết nối...</span>
    </header>

    <div id="video-grid"></div>

    <div id="controls">
      <button class="btn btn-cam" id="btn-cam" onclick="toggleCam()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 10l4.553-2.369A1 1 0 0121 8.566v6.868a1 1 0 01-1.447.895L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
        Camera
      </button>

      <button class="btn btn-mic" id="btn-mic" onclick="toggleMic()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4z"/>
          <path d="M19 10a7 7 0 01-14 0M12 19v4M8 23h8"/>
        </svg>
        Micro
      </button>

      <!-- Nút swap camera — JS sẽ show nếu thiết bị có nhiều camera -->
      <button class="btn btn-swap" id="btn-swap" onclick="swapCam()" title="Đổi camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
          <circle cx="12" cy="12" r="2"/>
          <path d="M7 3l-3 4M17 3l3 4"/>
        </svg>
        Đổi cam
      </button>

      <span id="peer-count">👥 1 người</span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      // ─── Config ───────────────────────────────────────────────
      const ICE_SERVERS = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun2.l.google.com:19302" },
        ],
      };

      // ─── State ────────────────────────────────────────────────
      const peers = new Map();   // peerId -> RTCPeerConnection
      const iceBuf = new Map();  // peerId -> [candidates]
      let localStream = null;
      let camOn = true;
      let micOn = true;
      let myId = null;

      // Swap cam state
      let currentFacingMode = "user";          // "user" = trước, "environment" = sau
      let availableCameras = [];               // danh sách deviceId camera
      let currentCamIndex = 0;                 // index trong availableCameras

      const grid = document.getElementById("video-grid");
      const statusEl = document.getElementById("status");
      const peerCount = document.getElementById("peer-count");

      // ─── Socket ───────────────────────────────────────────────
      const socket = io();

      socket.on("connect", () => {
        myId = socket.id;
        setStatus("Đã kết nối", false);
        startMedia();
      });

      socket.on("disconnect", () => setStatus("Mất kết nối", true));

      socket.on("existing-users", async (userIds) => {
        for (const uid of userIds) await createOffer(uid);
        updateCount();
      });

      socket.on("user-joined", ({ userId }) => {
        updateCount();
      });

      socket.on("offer", async ({ from, offer }) => {
        const pc = getOrCreatePC(from);
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        await flushIceBuf(from);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit("answer", { to: from, answer });
      });

      socket.on("answer", async ({ from, answer }) => {
        const pc = peers.get(from);
        if (!pc) return;
        if (pc.signalingState === "have-local-offer") {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          await flushIceBuf(from);
        }
      });

      socket.on("ice-candidate", async ({ from, candidate }) => {
        const pc = peers.get(from);
        if (!pc) return;
        if (pc.remoteDescription && pc.remoteDescription.type) {
          try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
          catch (e) { console.warn("addIceCandidate error:", e); }
        } else {
          if (!iceBuf.has(from)) iceBuf.set(from, []);
          iceBuf.get(from).push(candidate);
        }
      });

      socket.on("user-left", ({ userId }) => {
        closePeer(userId);
        updateCount();
      });

      // ─── Media ────────────────────────────────────────────────
      async function startMedia() {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: true,
          });
        } catch (e) {
          console.warn("Không lấy được media:", e);
          localStream = new MediaStream();
        }
        addVideoEl("local", localStream, "Bạn", true);
        await detectCameras();
        socket.emit("join");
      }

      // Kiểm tra thiết bị có nhiều camera không -> show nút swap
      async function detectCameras() {
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          availableCameras = devices.filter(d => d.kind === "videoinput");
          const btnSwap = document.getElementById("btn-swap");
          if (availableCameras.length > 1) {
            btnSwap.style.display = "flex";
          }
        } catch (e) {
          console.warn("enumerateDevices error:", e);
        }
      }

      // ─── Swap Camera ──────────────────────────────────────────
      async function swapCam() {
        if (!localStream) return;

        const btnSwap = document.getElementById("btn-swap");
        btnSwap.classList.add("swapping");
        btnSwap.disabled = true;

        try {
          // Đổi facingMode
          currentFacingMode = currentFacingMode === "user" ? "environment" : "user";

          // Lấy stream mới với camera đã đổi
          const newStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false, // giữ audio track cũ
          });

          const newVideoTrack = newStream.getVideoTracks()[0];
          const oldVideoTrack = localStream.getVideoTracks()[0];

          // Cập nhật video element local
          const videoEl = document.getElementById("video-local");
          if (videoEl) {
            // Tạo stream preview mới cho video local (giữ audio track cũ)
            const previewStream = new MediaStream([
              newVideoTrack,
              ...localStream.getAudioTracks(),
            ]);
            videoEl.srcObject = previewStream;
          }

          // Thay track trong localStream
          if (oldVideoTrack) {
            localStream.removeTrack(oldVideoTrack);
            oldVideoTrack.stop();
          }
          localStream.addTrack(newVideoTrack);

          // Replace track trong tất cả RTCPeerConnection đang có
          for (const [, pc] of peers) {
            const sender = pc.getSenders().find(s => s.track && s.track.kind === "video");
            if (sender) {
              await sender.replaceTrack(newVideoTrack);
            }
          }

          // Cập nhật trạng thái cam-off nếu cam đang tắt
          if (!camOn) {
            newVideoTrack.enabled = false;
          }

        } catch (e) {
          console.error("Swap cam error:", e);
          // Nếu lỗi (vd: không có camera sau), quay lại facingMode cũ
          currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
          setStatus("Không thể đổi camera", true);
          setTimeout(() => setStatus("Đã kết nối", false), 2000);
        } finally {
          setTimeout(() => {
            btnSwap.classList.remove("swapping");
            btnSwap.disabled = false;
          }, 400);
        }
      }

      // ─── RTCPeerConnection factory ────────────────────────────
      function getOrCreatePC(peerId) {
        if (peers.has(peerId)) return peers.get(peerId);

        const pc = new RTCPeerConnection(ICE_SERVERS);
        peers.set(peerId, pc);
        iceBuf.set(peerId, []);

        if (localStream) {
          localStream.getTracks().forEach((t) => pc.addTrack(t, localStream));
        }

        pc.ontrack = ({ streams }) => {
          const stream = streams[0];
          if (!stream) return;
          const existing = document.getElementById(`video-${peerId}`);
          if (existing) {
            existing.srcObject = stream;
          } else {
            addVideoEl(peerId, stream, shortId(peerId), false);
          }
          updateCount();
        };

        pc.onicecandidate = ({ candidate }) => {
          if (candidate) socket.emit("ice-candidate", { to: peerId, candidate });
        };

        pc.onconnectionstatechange = () => {
          if (pc.connectionState === "failed") pc.restartIce();
          if (["disconnected", "closed", "failed"].includes(pc.connectionState)) {
            closePeer(peerId);
            updateCount();
          }
        };

        return pc;
      }

      async function createOffer(peerId) {
        const pc = getOrCreatePC(peerId);
        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          socket.emit("offer", { to: peerId, offer });
        } catch (e) {
          console.error("createOffer error:", e);
        }
      }

      async function flushIceBuf(peerId) {
        const buf = iceBuf.get(peerId) || [];
        const pc = peers.get(peerId);
        if (!pc) return;
        for (const c of buf) {
          try { await pc.addIceCandidate(new RTCIceCandidate(c)); }
          catch (e) { console.warn("flush ICE error:", e); }
        }
        iceBuf.set(peerId, []);
      }

      function closePeer(peerId) {
        const pc = peers.get(peerId);
        if (pc) { pc.close(); peers.delete(peerId); iceBuf.delete(peerId); }
        const el = document.getElementById(`wrapper-${peerId}`);
        if (el) el.remove();
      }

      // ─── Video DOM ────────────────────────────────────────────
      function addVideoEl(id, stream, label, muted) {
        if (document.getElementById(`wrapper-${id}`)) return;

        const wrapper = document.createElement("div");
        wrapper.className = "video-wrapper";
        wrapper.id = `wrapper-${id}`;

        const video = document.createElement("video");
        video.id = `video-${id}`;
        video.autoplay = true;
        video.playsInline = true;
        video.muted = muted;
        video.srcObject = stream;

        const lbl = document.createElement("div");
        lbl.className = "label";
        lbl.textContent = label;

        const overlay = document.createElement("div");
        overlay.className = "cam-off-overlay";
        overlay.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15 10l4.553-2.369A1 1 0 0121 8.566v6.868a1 1 0 01-1.447.895L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
            <line x1="3" y1="3" x2="21" y2="21"/>
          </svg>
          <span>Cam tắt</span>`;

        wrapper.appendChild(video);
        wrapper.appendChild(lbl);
        wrapper.appendChild(overlay);
        grid.appendChild(wrapper);
      }

      // ─── Controls ─────────────────────────────────────────────
      function toggleCam() {
        if (!localStream) return;
        camOn = !camOn;
        localStream.getVideoTracks().forEach((t) => (t.enabled = camOn));
        const btn = document.getElementById("btn-cam");
        const wrapper = document.getElementById("wrapper-local");
        btn.classList.toggle("off", !camOn);
        if (wrapper) wrapper.classList.toggle("cam-off", !camOn);
        btn.innerHTML = camOn
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.369A1 1 0 0121 8.566v6.868a1 1 0 01-1.447.895L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg> Camera`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.369A1 1 0 0121 8.566v6.868a1 1 0 01-1.447.895L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/><line x1="3" y1="3" x2="21" y2="21"/></svg> Camera`;
      }

      function toggleMic() {
        if (!localStream) return;
        micOn = !micOn;
        localStream.getAudioTracks().forEach((t) => (t.enabled = micOn));
        const btn = document.getElementById("btn-mic");
        btn.classList.toggle("off", !micOn);
        btn.innerHTML = micOn
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4z"/><path d="M19 10a7 7 0 01-14 0M12 19v4M8 23h8"/></svg> Micro`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4z"/><line x1="3" y1="3" x2="21" y2="21"/><path d="M19 10a7 7 0 01-14 0M12 19v4M8 23h8"/></svg> Micro`;
      }

      // ─── Helpers ──────────────────────────────────────────────
      function setStatus(msg, isErr) {
        statusEl.textContent = msg;
        statusEl.className = isErr ? "error" : "";
      }

      function updateCount() {
        const n = peers.size + 1;
        peerCount.textContent = `👥 ${n} người`;
      }

      function shortId(id) {
        return "User-" + id.slice(0, 4).toUpperCase();
      }
    </script>
  </body>
</html>
