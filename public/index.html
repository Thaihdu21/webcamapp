<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC Multi-Cam</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Lưới hiển thị Video */
        #video-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 10px; overflow-y: auto; align-content: center; justify-content: center; }
        @media (max-width: 600px) { #video-grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; padding: 8px; } }

        .video-container { position: relative; width: 100%; padding-top: 133.33%; /* Tỉ lệ 3:4 tối ưu cho mobile đứng */ background: #1e1e1e; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* Mirror view */ }
        
        /* Thanh điều khiển dưới đáy */
        #controls { height: 80px; background: rgba(30, 30, 30, 0.95); display: flex; justify-content: center; align-items: center; gap: 15px; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid #2d2d2d; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
        .btn:active { transform: scale(0.9); }
        .btn.off { background: #ea4335 !important; }
        #btn-swap { background: #007bff; }
        
        /* Nhãn tên/Trạng thái */
        .status-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 11px; z-index: 10; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="video-grid">
        <div class="video-container" id="local-container">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="status-tag">Bạn</div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-mic" class="btn">🎤</button>
        <button id="btn-cam" class="btn">📷</button>
        <button id="btn-swap" class="btn">🔄</button>
    </div>

    <script>
     const socket = io('/');
const videoGrid = document.getElementById('video-grid');
const localVideo = document.getElementById('local-video');

let localStream;
let peerConnections = {}; // Lưu trữ tất cả kết nối: { peerId: RTCPeerConnection }
let currentFacingMode = "user"; // "user" (trước) hoặc "environment" (sau)

// Cấu hình STUN Server miễn phí của Google (Bắt buộc để kết nối qua 4G/khác mạng)
const rtcConfig = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
    ]
};

// Tối ưu hóa cấu hình video cho máy yếu và Mobile đời cũ (Giảm độ phân giải xuống 240p - 360p)
const mediaConstraints = {
    audio: true,
    video: {
        width: { ideal: 480 },
        height: { ideal: 360 },
        frameRate: { ideal: 15 }, // 15fps giúp máy đỡ nóng và mượt hơn
        facingMode: currentFacingMode
    }
};

// 1. Khởi động Camera/Mic của chính mình
async function startLocalStream() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
        localVideo.srcObject = localStream;
    } catch (error) {
        console.error("Không thể truy cập Camera/Mic:", error);
        alert("Vui lòng cấp quyền Camera và Microphone!");
    }
}

// 2. Hàm tạo và quản lý một Peer Connection mới
function createPeerConnection(peerId, initiateOffer = false) {
    if (peerConnections[peerId]) return peerConnections[peerId];

    const pc = new RTCPeerConnection(rtcConfig);
    peerConnections[peerId] = pc;

    // Đẩy các track (Audio/Video) của mình vào kết nối này
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    // Thu thập ICE Candidate và gửi cho peer thông qua Server Signaling
    pc.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit('relay-ice', { peerId, iceCandidate: event.candidate });
        }
    };

    // Khi nhận được luồng video từ máy máy khác, hiển thị lên màn hình
    pc.ontrack = (event) => {
        if (document.getElementById(`container-${peerId}`)) return;

        const container = document.createElement('div');
        container.className = 'video-container';
        container.id = `container-${peerId}`;

        const video = document.createElement('video');
        video.srcObject = event.streams[0];
        video.autoplay = true;
        video.setAttribute('playsinline', true); // Bắt buộc cho iOS/Safari không bị nhảy full màn hình
        
        // Cam của người khác thì không lật gương (tùy chọn)
        video.style.transform = "scaleX(1)"; 

        const tag = document.createElement('div');
        tag.className = 'status-tag';
        tag.innerText = `User...${peerId.substring(0, 4)}`;

        container.appendChild(video);
        container.appendChild(tag);
        videoGrid.appendChild(container);
    };

    // Xử lý logic tạo Offer nếu mình là người vào sau
    if (initiateOffer) {
        pc.onnegotiationneeded = async () => {
            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('relay-sdp', { peerId, sdp: pc.localDescription });
            } catch (err) { console.error(err); }
        };
    }

    return pc;
}

// 3. Lắng nghe các sự kiện từ Signaling Server
socket.on('all-users', async (users) => {
    await startLocalStream();
    // Mình là người mới vào -> Tạo Offer gửi cho tất cả user cũ
    users.forEach(peerId => {
        createPeerConnection(peerId, true);
    });
});

socket.on('sdp', async ({ peerId, sdp }) => {
    let pc = createPeerConnection(peerId, false);
    
    try {
        await pc.setRemoteDescription(new RTCSessionDescription(sdp));
        if (sdp.type === 'offer') {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('relay-sdp', { peerId, sdp: pc.localDescription });
        }
    } catch (err) { console.error("Lỗi xử lý SDP:", err); }
});

socket.on('ice', async ({ peerId, iceCandidate }) => {
    let pc = peerConnections[peerId];
    if (pc) {
        try {
            await pc.addIceCandidate(new RTCIceCandidate(iceCandidate));
        } catch (e) { console.error("Lỗi thêm ICE:", e); }
    }
});

socket.on('user-disconnected', (peerId) => {
    if (peerConnections[peerId]) {
        peerConnections[peerId].close();
        delete peerConnections[peerId];
    }
    const el = document.getElementById(`container-${peerId}`);
    if (el) el.remove();
});

// 4. Các tính năng Nút bấm điều khiển (UI Controls)
document.getElementById('btn-mic').addEventListener('click', function() {
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
        audioTrack.enabled = !audioTrack.enabled;
        this.classList.toggle('off', !audioTrack.enabled);
        this.innerText = audioTrack.enabled ? "🎤" : "🔇";
    }
});

document.getElementById('btn-cam').addEventListener('click', function() {
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) {
        videoTrack.enabled = !videoTrack.enabled;
        this.classList.toggle('off', !videoTrack.enabled);
        this.innerText = videoTrack.enabled ? "📷" : "🚫";
    }
});

// Tính năng đổi Camera trước/sau tối ưu cho Mobile
document.getElementById('btn-swap').addEventListener('click', async () => {
    if (!localStream) return;
    
    currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
    mediaConstraints.video.facingMode = currentFacingMode;

    // Tắt track cũ để giải phóng camera
    localStream.getVideoTracks().forEach(track => track.stop());

    try {
        const newStream = await navigator.mediaDevices.getUserMedia({ 
            video: mediaConstraints.video 
        });
        const newVideoTrack = newStream.getVideoTracks()[0];

        // Cập nhật lại màn hình local của mình
        const localVideoTrack = localStream.getVideoTracks()[0];
        localStream.removeTrack(localVideoTrack);
        localStream.addTrack(newVideoTrack);
        localVideo.srcObject = localStream;

        // Xử lý hiệu ứng lật gương: Trước thì lật, Sau thì không lverted
        localVideo.style.transform = currentFacingMode === "user" ? "scaleX(-1)" : "scaleX(1)";

        // Thay thế track trên tất cả các kết nối peer đang chạy mà không cần gọi lại từ đầu
        for (let peerId in peerConnections) {
            const senders = peerConnections[peerId].getSenders();
            const sender = senders.find(s => s.track && s.track.kind === 'video');
            if (sender) {
                sender.replaceTrack(newVideoTrack);
            }
        }
    } catch (err) {
        console.error("Không thể đổi camera:", err);
    }
});
    </script>
</body>
</html>
